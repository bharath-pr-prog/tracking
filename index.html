<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-[#0b0e14] text-white">
    <div id="root"></div>
    <script type="text/babel">
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwUjnJd-Cf5UO9yRJn8bqBUarLi7ZHqngSwKsolwe93SKtqdNxkJtwLwJvFhYkRggy_/exec";
        const GOOGLE_CLIENT_ID = "1003946395665-5lclr3984nj3h2gacunplf45sa4lh4ej.apps.googleusercontent.com";

        function App() {
            const [token, setToken] = useState(null);

            const handleCredentialResponse = (res) => { setToken(res.credential); };

            useEffect(() => {
                window.google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleCredentialResponse });
                window.google.accounts.id.renderButton(document.getElementById("googleSignInDiv"), { theme: "outline", size: "large" });
            }, []);

            const syncToSheet = async () => {
                const payload = { action: "sync_to_sheet", token, orderId: "35", trackingNumber: "1234", courier: "FedEx", productCost: "10", returnFee: "2", refundAmount: "8", files: "None", status: "SYNCED" };
                const res = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'cors', body: JSON.stringify(payload) });
                if(res.ok) alert("Synced to Sheet1!");
            };

            if (!token) return <div className="p-10 flex justify-center"><div id="googleSignInDiv"></div></div>;

            return (
                <div className="p-10">
                    <button onClick={syncToSheet} className="bg-emerald-600 px-6 py-3 rounded-xl font-black uppercase">
                        Sync to Sheet
                    </button>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
