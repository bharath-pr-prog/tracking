<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Tracker Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tesseract.js@v5.0.2/dist/tesseract.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background-color: #0b0e14; color: #cbd5e1; font-family: 'Segoe UI', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 5px; width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0b0e14; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(4px);} to { opacity:1; transform:translateY(0);} }
        .animate-fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes pulseRing { 0%,100%{box-shadow:0 0 0 0 rgba(250,204,21,.4);}50%{box-shadow:0 0 0 6px rgba(250,204,21,0);} }
        .pulse-ring { animation: pulseRing 1.8s infinite; }
    </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const GS_URL = "https://script.google.com/macros/s/AKfycbz_3qDJmYs4uASWNgsJa7VEz-lrfUxfQFMo5hsEt73dPyhna7VQONNn4WiuzIIXouan/exec";
const GC_ID = "1003946395665-5lclr3984nj3h2gacunplf45sa4lh4ej.apps.googleusercontent.com";
const ITEMS = 50;
const post = (p) => fetch(GS_URL, { method:'POST', mode:'no-cors', body:JSON.stringify(p) });

const HELPDESK_TABS = [
    { id:"Tracking related issue", label:"Tracking" },
    { id:"Damage claims replacement/reship request", label:"Damage Claims" },
    { id:"General issues", label:"Issues" },
    { id:"Order modification", label:"Order Mods" },
    { id:"Refund request", label:"Refund Requests" }
];
const HD_CATS = HELPDESK_TABS.map(t=>t.id);

// ── PendingCard (outside App so hooks work) ──────────────────────────────
const PendingCard = ({item,accentColor,userRole,userEmail,token,communications,setCommunications,loadDatabase,setSyncingItem,setSyncOverrides,setEditingPending,setEditForm,setEditBase64,setEditFiles,discardPending,isManagerRequestLocked}) => {
    const p = item.payload||{};
    const isMgr = userRole==="MANAGER";
    const canEdit = isMgr && (item.type==='recall_initiate'||item.type==='ticket_create') && !isManagerRequestLocked(item);
    const [cardReply,setCardReply]=React.useState('');
    const [cardLinks,setCardLinks]=React.useState('');
    const [cardSending,setCardSending]=React.useState(false);

    const sendCardMsg = async()=>{
        if(!cardReply&&!cardLinks) return;
        setCardSending(true);
        const msg=cardReply,lnk=cardLinks;
        try {
            await post({action:'send_message',token,refId:p.orderId,comment:msg,links:lnk,ticketFiles:[],orderId:p.orderId,category:p.category});
            setCommunications(prev=>[...prev,{date:new Date().toISOString(),refId:p.orderId,author:userEmail,role:userRole,comment:msg,links:lnk,files:[],_optimistic:true}]);
            setCardReply('');setCardLinks('');
            setTimeout(()=>{setCardSending(false);loadDatabase();},2000);
        }catch(e){setCardSending(false);}
    };
    const threadMsgs=[];
    if(p.comment||(p.ticketFiles&&p.ticketFiles.length>0))
        threadMsgs.push({date:item.createdAt,author:item.createdBy,role:item.createdByRole,comment:p.comment||"",links:p.links||"",files:p.ticketFiles||[]});
    communications.filter(c=>String(c.refId)===String(p.orderId))
        .sort((a,b)=>new Date(a.date)-new Date(b.date))
        .forEach(c=>threadMsgs.push({date:c.date,author:c.author,role:c.role,comment:c.comment,links:c.links,files:c.files||[]}));

    return (
    <div className={`bg-[#0b0e14] border border-${accentColor}-500/30 rounded-2xl mb-3 overflow-hidden animate-fade-in`}>
        <div className="px-5 pt-4 pb-3 border-b border-slate-800">
            <div className="flex items-center gap-2 flex-wrap mb-1">
                <span className={`text-[9px] font-black uppercase tracking-widest text-${accentColor}-400 bg-${accentColor}-500/10 px-2 py-1 rounded-full`}>Awaiting Approval</span>
                {item.editedBadge&&<span className="text-[9px] font-black uppercase text-yellow-400 bg-yellow-500/10 px-2 py-1 rounded-full pulse-ring">✏️ Edited</span>}
            </div>
            <p className="text-white font-black text-sm">{p.orderId||"—"} {p.category&&<span className="text-[10px] text-slate-500 ml-1">{p.category}</span>}</p>
            <p className="text-[10px] text-slate-500 uppercase">{item.createdBy} • {new Date(item.createdAt).toLocaleString()}</p>
            {p.refundAmount&&<p className="text-[10px] text-emerald-400 font-bold mt-1">Refund: ${p.refundAmount}</p>}
        </div>
        {(p.trackingNumber||p.productCost)&&(
        <div className="px-5 py-3 border-b border-slate-800 text-xs text-slate-300 space-y-1">
            {p.trackingNumber&&p.trackingNumber!=="No Tracking"&&<p><span className="text-slate-500 font-bold">Tracking:</span> {p.trackingNumber}</p>}
            {p.courier&&p.courier!=="N/A"&&<p><span className="text-slate-500 font-bold">Courier:</span> {p.courier}</p>}
            {p.productCost&&<p><span className="text-slate-500 font-bold">Cost:</span> ${p.productCost} • Fee: ${p.returnFee} • Refund: ${p.refundAmount}</p>}
            {p.images&&p.images.length>0&&<div className="flex gap-2 flex-wrap">{p.images.map((u,i)=><a key={i} href={u} target="_blank" className="bg-slate-800 px-2 py-1 rounded text-[10px] text-slate-300 hover:text-white">🏷️ {i+1}</a>)}</div>}
        </div>
        )}
        {threadMsgs.length>0&&(
        <div className="px-5 py-4 space-y-3 max-h-64 overflow-y-auto custom-scrollbar">
            {threadMsgs.map((msg,i)=>{
                const isMe=msg.role===userRole;
                return(<div key={i} className={`flex flex-col ${isMe?'items-end':'items-start'}`}>
                    <span className="text-[9px] font-bold text-slate-500 mb-1 uppercase">{msg.role} • {new Date(msg.date).toLocaleDateString()}</span>
                    <div className={`px-4 py-2.5 rounded-2xl max-w-[85%] text-sm ${isMe?'bg-purple-600/20 border border-purple-500/30 text-white':'bg-slate-800 border border-slate-700 text-slate-200'}`}>
                        {msg.comment&&<p className="whitespace-pre-wrap font-medium">{msg.comment}</p>}
                        {msg.links&&<a href={msg.links} target="_blank" className="text-blue-400 text-xs underline mt-1 block break-all">{msg.links}</a>}
                        {msg.files&&msg.files.length>0&&<div className="mt-2 flex gap-1 flex-wrap">{msg.files.map((u,fi)=><a key={fi} href={u} target="_blank" className="bg-slate-900 px-2 py-0.5 rounded text-[10px] text-slate-300 hover:text-white">📎 {fi+1}</a>)}</div>}
                    </div>
                </div>);
            })}
        </div>
        )}
        {item.edits&&item.edits.length>0&&(
        <div className="mx-5 mb-3 p-2 bg-yellow-500/5 border border-yellow-500/20 rounded-lg">
            {item.edits.map((ed,i)=><p key={i} className="text-[10px] text-slate-400 italic">[{new Date(ed.editedAt).toLocaleString()}] {ed.editedBy}: {ed.changes.join("; ")}</p>)}
        </div>
        )}
        {isMgr&&(
        <div className="px-5 pb-3 pt-3 border-t border-slate-800 space-y-2">
            <textarea value={cardReply} onChange={e=>setCardReply(e.target.value)} placeholder="Reply to supplier..." rows="2" className="w-full bg-[#161b22] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-purple-500 font-bold text-xs custom-scrollbar resize-none"/>
            <div className="flex gap-2">
                <input value={cardLinks} onChange={e=>setCardLinks(e.target.value)} placeholder="Links (Opt)" className="flex-1 bg-[#161b22] border border-slate-700 rounded-xl p-2.5 text-white outline-none focus:border-purple-500 font-bold text-xs"/>
                <button onClick={sendCardMsg} disabled={!cardReply&&!cardLinks} className="flex-1 bg-purple-600 hover:bg-purple-500 text-white py-2.5 rounded-xl font-black text-[11px] tracking-widest uppercase disabled:opacity-30 transition-all">{cardSending?'Sending...':'➤ Send'}</button>
            </div>
        </div>
        )}
        {!isMgr&&<div className="px-5 pb-3 pt-2 border-t border-slate-800"><p className="text-[10px] text-slate-500 font-bold uppercase italic">Waiting for Manager approval...</p></div>}
        {isMgr&&(
        <div className="flex gap-2 px-5 pb-4 pt-2 border-t border-slate-800">
            <button onClick={()=>{setSyncingItem(item);setSyncOverrides({});}} className="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white py-2.5 rounded-xl font-black text-[11px] tracking-widest uppercase transition-all">✓ Approve</button>
            {canEdit&&<button onClick={()=>{setEditingPending(item);setEditForm({orderId:p.orderId||'',status:p.status||'',comment:p.comment||'',links:p.links||''});setEditFiles([]);setEditBase64([]);}} className="flex-1 bg-yellow-500/20 border border-yellow-500 text-yellow-400 hover:bg-yellow-500/30 py-2.5 rounded-xl font-black text-[11px] tracking-widest uppercase transition-all">✏️ Edit</button>}
            <button onClick={()=>discardPending(item.id)} className="bg-red-500/20 border border-red-500 text-red-400 hover:bg-red-500/30 px-4 py-2.5 rounded-xl font-black text-[11px] tracking-widest uppercase transition-all">✕</button>
        </div>
        )}
    </div>
    );
};

// ── App ──────────────────────────────────────────────────────────────────
function App() {
    const [isAuth,setIsAuth]=useState(false);
    const [token,setToken]=useState(null);
    const [authError,setAuthError]=useState("");
    const [userRole,setUserRole]=useState("SUPPLIER");
    const [userEmail,setUserEmail]=useState("");
    const [activeTab,setActiveTab]=useState('scanner');
    const [dbRecords,setDbRecords]=useState([]);
    const [tickets,setTickets]=useState([]);
    const [communications,setCommunications]=useState([]);
    const [pending,setPending]=useState([]);
    const [status,setStatus]=useState('idle');
    const [lastUpdated,setLastUpdated]=useState(null);
    const [currentPage,setCurrentPage]=useState(1);
    const tokenRef = useRef(null);

    // Std scan
    const [orderId,setOrderId]=useState('');
    const [trackingNumber,setTrackingNumber]=useState('');
    const [courier,setCourier]=useState('');
    const [productCost,setProductCost]=useState('');
    const [returnFee,setReturnFee]=useState('');
    const [files,setFiles]=useState([]);
    const [base64Images,setBase64Images]=useState([]);
    const fileInputRef=useRef(null);
    const [stdStatus,setStdStatus]=useState('Closed');
    const [stdComment,setStdComment]=useState('');
    const [stdLinks,setStdLinks]=useState('');
    const [stdExtraFiles,setStdExtraFiles]=useState([]);
    const [stdExtraBase64,setStdExtraBase64]=useState([]);
    const stdExtraInputRef=useRef(null);

    // Recalls
    const [recallOrderId,setRecallOrderId]=useState('');
    const [resolvingId,setResolvingId]=useState(null);
    const [recallStatus,setRecallStatus]=useState('Waiting on Supplier');
    const [recallComment,setRecallComment]=useState('');
    const [recallLinks,setRecallLinks]=useState('');
    const [recallFiles,setRecallFiles]=useState([]);
    const [recallBase64,setRecallBase64]=useState([]);
    const recallFileInputRef=useRef(null);

    // Helpdesk
    const [activeTicket,setActiveTicket]=useState(null);
    const [showCreateTicket,setShowCreateTicket]=useState(false);
    const [hdOrderId,setHdOrderId]=useState('');
    const [hdStatus,setHdStatus]=useState('');
    const [hdComment,setHdComment]=useState('');
    const [hdLinks,setHdLinks]=useState('');
    const [hdRefundAmount,setHdRefundAmount]=useState('');
    const [hdFiles,setHdFiles]=useState([]);
    const [hdBase64Files,setHdBase64Files]=useState([]);
    const hdFileInputRef=useRef(null);

    // Modals
    const [editingPending,setEditingPending]=useState(null);
    const [editForm,setEditForm]=useState({orderId:'',status:'',comment:'',links:''});
    const [editFiles,setEditFiles]=useState([]);
    const [editBase64,setEditBase64]=useState([]);
    const editFileInputRef=useRef(null);
    const [syncingItem,setSyncingItem]=useState(null);
    const [syncOverrides,setSyncOverrides]=useState({});

    // Search tab
    const [searchQuery,setSearchQuery]=useState('');
    const [searchResult,setSearchResult]=useState(null); // { orderId, messages, records }

    useEffect(()=>{setCurrentPage(1);},[activeTab]);

    // ── Auth ──────────────────────────────────────────────────────────
    const handleCredentialResponse=async(response)=>{
        const jwt=response.credential;
        setAuthError("Verifying...");
        try{
            const res=await fetch(`${GS_URL}?token=${jwt}`);
            const data=await res.json();
            if(data.error){setAuthError(`Access Denied: ${data.error}`);}
            else{
                tokenRef.current=jwt;
                setToken(jwt);setUserRole(data.role?data.role.toUpperCase():"SUPPLIER");
                setUserEmail(data.email||"");
                setDbRecords(Array.isArray(data.records)?data.records:[]);
                setTickets(Array.isArray(data.tickets)?data.tickets:[]);
                setCommunications(Array.isArray(data.communications)?data.communications:[]);
                setPending(Array.isArray(data.pending)?data.pending:[]);
                setIsAuth(true);setAuthError("");setLastUpdated(new Date());
            }
        }catch(e){setAuthError("Connection Failed.");}
    };
    useEffect(()=>{
        if(isAuth)return;
        const render=()=>{ if(window.google&&document.getElementById("gSignIn")){
            window.google.accounts.id.initialize({client_id:GC_ID,callback:handleCredentialResponse});
            window.google.accounts.id.renderButton(document.getElementById("gSignIn"),{theme:"outline",size:"large"});
        }};
        if(window.google)render();
        else{const t=setInterval(()=>{if(window.google){clearInterval(t);render();}},200);}
    },[isAuth]);

    // ── Load / Polling ────────────────────────────────────────────────
    const loadDatabase=useCallback(async(silent=false)=>{
        const tk=tokenRef.current;
        if(!tk)return;
        try{
            const res=await fetch(`${GS_URL}?token=${tk}`);
            const data=await res.json();
            if(Array.isArray(data.records))setDbRecords(data.records);
            if(Array.isArray(data.tickets))setTickets(data.tickets);
            if(Array.isArray(data.pending))setPending(data.pending);
            if(Array.isArray(data.communications)){
                setCommunications(prev=>{
                    const confirmed=data.communications;
                    const optimistic=prev.filter(m=>m._optimistic&&!confirmed.some(c=>String(c.refId)===String(m.refId)&&String(c.comment)===String(m.comment)&&String(c.author)===String(m.author)));
                    return[...confirmed,...optimistic];
                });
            }
            setLastUpdated(new Date());
        }catch(e){}
    },[]);

    // 5-second polling for instant messages
    useEffect(()=>{
        if(!isAuth)return;
        const interval=setInterval(()=>loadDatabase(true),5000);
        return()=>clearInterval(interval);
    },[isAuth,loadDatabase]);

    // ── Helpers ───────────────────────────────────────────────────────
    const switchTab=(t)=>{setActiveTab(t);setShowCreateTicket(false);setActiveTicket(null);setEditingPending(null);setSyncingItem(null);setResolvingId(null);};
    const processFiles=async(e,setF,setB)=>{
        const fs=Array.from(e.target.files);if(!fs.length)return;
        setF(fs);setStatus('reading_files');
        try{const b64=[];for(const f of fs){const b=await new Promise(r=>{const rd=new FileReader();rd.onloadend=()=>r(rd.result);rd.readAsDataURL(f);});b64.push(b);}setB(b64);}catch(e){}
        setStatus('idle');
    };
    const resetHD=()=>{setHdOrderId('');setHdStatus('');setHdComment('');setHdLinks('');setHdFiles([]);setHdBase64Files([]);setHdRefundAmount('');};
    const resetRecall=()=>{setRecallStatus(userRole==="MANAGER"?'Waiting on Supplier':'Waiting on Manager');setRecallComment('');setRecallLinks('');setRecallFiles([]);setRecallBase64([]);};
    const resetStd=()=>{setOrderId('');setProductCost('');setReturnFee('');setTrackingNumber('');setCourier('');setFiles([]);setBase64Images([]);setStdStatus('Closed');setStdComment('');setStdLinks('');setStdExtraFiles([]);setStdExtraBase64([]);};

    const submitToPending=async(type,payload)=>{
        setStatus('syncing');
        try{await post({action:'submit_pending',token,type,payload});setTimeout(()=>{setStatus('idle');loadDatabase();},1500);}
        catch(e){setStatus('idle');}
    };

    const clearEditedBadge=async(pendingId)=>{
        try{await post({action:'clear_edited_badge',token,pendingId});}catch(e){}
    };

    const isManagerRequestLocked=(item)=>{
        if(item.type==='recall_initiate')return pending.some(p=>p.type==='recall_complete'&&p.payload&&String(p.payload.orderId)===String(item.payload.orderId));
        return false;
    };

    // ── Standard Scan ─────────────────────────────────────────────────
    const handleLabelUpload=async(e)=>{
        const fs=Array.from(e.target.files);if(!fs.length)return;
        setFiles(fs);setStatus('scanning');
        try{
            let b64=[],txt="";
            for(const f of fs){const b=await new Promise(r=>{const rd=new FileReader();rd.onloadend=()=>r(rd.result);rd.readAsDataURL(f);});b64.push(b);const{data:{text}}=await Tesseract.recognize(f,'eng');txt+=text+" ";}
            setBase64Images(b64);
            const clean=txt.toUpperCase().replace(/\n/g,' ');
            let fc="";if(clean.includes("FEDEX"))fc="FedEx Ground";else if(clean.includes("UPS")||clean.includes("1Z"))fc="UPS";else if(clean.includes("USPS"))fc="USPS";else if(clean.includes("AMAZON")||clean.includes("TBA"))fc="Amazon";
            const ms=[...clean.matchAll(/(?:TRK|TRACKING|TRK#|TRKE)\s*[:#]?\s*([\d\s]{12,25})/gi)];
            const trks=[...new Set(ms.map(m=>m[1].replace(/[^0-9]/g,'').substring(0,12)).filter(d=>d.length>=12))];
            if(trks.length>0&&!fc)fc="FedEx Ground";
            if(trks.length>0)setTrackingNumber(trks.join(" , "));
            if(fc)setCourier(fc);
        }catch(e){}
        setStatus('idle');
    };
    const handleStdSubmit=async()=>{
        const refund=(parseFloat(productCost)||0)-(parseFloat(returnFee)||0);
        await submitToPending('standard',{orderId,trackingNumber:trackingNumber||"No Tracking",courier:courier||"N/A",images:base64Images,productCost,returnFee,refundAmount:refund.toFixed(2),status:userRole==="MANAGER"?stdStatus:"Waiting on Manager",comment:stdComment,links:stdLinks,ticketFiles:stdExtraBase64});
        resetStd();
    };

    // ── Recalls ───────────────────────────────────────────────────────
    const initiateRecall=async()=>{
        if(!recallOrderId)return;
        await submitToPending('recall_initiate',{orderId:recallOrderId,status:recallStatus,comment:recallComment,links:recallLinks,ticketFiles:recallBase64});
        setRecallOrderId('');resetRecall();
    };
    const completeRecall=async(targetOrderId)=>{
        const refund=(parseFloat(productCost)||0)-(parseFloat(returnFee)||0);
        await submitToPending('recall_complete',{orderId:targetOrderId,trackingNumber,courier,productCost,returnFee,refundAmount:refund.toFixed(2),status:userRole==="MANAGER"?recallStatus:"Waiting on Manager",comment:recallComment,links:recallLinks,ticketFiles:recallBase64});
        setResolvingId(null);resetStd();resetRecall();
    };

    // ── Helpdesk ──────────────────────────────────────────────────────
    const submitNewTicket=async()=>{
        setStatus('syncing');
        const payload={orderId:hdOrderId,category:activeTab,status:userRole==="MANAGER"?hdStatus:"Waiting on Manager",comment:hdComment,links:hdLinks,ticketFiles:hdBase64Files,refundAmount:hdRefundAmount||""};
        try{
            const res=await fetch(GS_URL,{method:'POST',body:JSON.stringify({action:'submit_pending',token,type:'ticket_create',payload})});
            const result=await res.json();
            if(result.pendingId&&hdComment){
                await post({action:'send_message',token,refId:hdOrderId,comment:hdComment,links:hdLinks,ticketFiles:[],orderId:hdOrderId,category:activeTab});
            }
            setTimeout(()=>{setStatus('idle');loadDatabase();},1500);
        }catch(e){setStatus('idle');}
        setShowCreateTicket(false);resetHD();
    };

    const sendMessage=async()=>{
        if(!hdComment&&!hdLinks&&hdBase64Files.length===0)return;
        const refId=activeTicket.orderId;
        const comment=hdComment,links=hdLinks;
        try{
            await post({action:'send_message',token,refId,comment,links,ticketFiles:hdBase64Files,orderId:activeTicket.orderId,category:activeTicket.category});
            setCommunications(prev=>[...prev,{date:new Date().toISOString(),refId,author:userEmail,role:userRole,comment,links,files:[],_optimistic:true}]);
            setHdComment('');setHdLinks('');setHdFiles([]);setHdBase64Files([]);setHdStatus('');
            setTimeout(()=>loadDatabase(),2500);
        }catch(e){}
    };

    const submitEdit=async()=>{
        if(!editingPending)return;
        setStatus('syncing');
        try{await post({action:'edit_pending_request',token,pendingId:editingPending.id,payload:{...editForm,ticketFiles:editBase64}});
        setTimeout(()=>{setEditingPending(null);setEditFiles([]);setEditBase64([]);setStatus('idle');loadDatabase();},1500);}
        catch(e){setStatus('idle');}
    };
    const syncPending=async(pendingId,overrides)=>{
        setStatus('syncing');
        try{await post({action:'sync_pending',token,pendingId,overrides:overrides||{}});
        setTimeout(()=>{setSyncingItem(null);setSyncOverrides({});setStatus('idle');loadDatabase();},1500);}
        catch(e){setStatus('idle');}
    };
    const discardPending=async(pendingId)=>{
        if(!confirm("Discard this pending item?"))return;
        setStatus('syncing');
        try{await post({action:'discard_pending',token,pendingId});setTimeout(()=>{setStatus('idle');loadDatabase();},1500);}
        catch(e){setStatus('idle');}
    };

    // ── Download helper ───────────────────────────────────────────────
    const downloadFiles=(links)=>{
        if(!links)return;
        const urls=links.split(" , ").filter(u=>u&&u.startsWith("http"));
        if(!urls.length){alert("No attachments found.");return;}
        urls.forEach((url,i)=>{
            // Convert Google Drive view URL to direct download
            const fileIdMatch=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            if(fileIdMatch){
                const dlUrl=`https://drive.google.com/uc?export=download&id=${fileIdMatch[1]}`;
                const a=document.createElement('a');a.href=dlUrl;a.download=`attachment_${i+1}`;a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);
            } else {
                window.open(url,'_blank');
            }
        });
    };

    // ── Search ────────────────────────────────────────────────────────
    const runSearch=(q)=>{
        if(!q.trim())return;
        const oid=q.trim().toLowerCase();
        // Messages: match by refId (which is now always orderId)
        const msgs=communications.filter(c=>String(c.refId).toLowerCase()===oid);
        const recs=dbRecords.filter(r=>String(r.orderId).toLowerCase()===oid||String(r.trackingNumber).toLowerCase().includes(oid));
        const tix=tickets.filter(t=>String(t.orderId).toLowerCase()===oid);
        setSearchResult({query:q.trim(),messages:msgs,records:recs,tickets:tix});
    };

    if(!isAuth)return(
    <div className="min-h-screen flex items-center justify-center bg-[#0b0e14]">
        <div className="bg-[#161b22] border border-slate-800 rounded-[2rem] p-10 shadow-2xl flex flex-col items-center text-center max-w-md w-full">
            <div className="w-16 h-16 bg-blue-600/20 rounded-full flex items-center justify-center mb-6"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#3b82f6" viewBox="0 0 16 16"><path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/></svg></div>
            <h1 className="text-2xl font-black text-white tracking-widest uppercase mb-2">Secure Gateway</h1>
            <div id="gSignIn" className="mt-6"></div>
            {authError&&<p className="mt-4 text-red-400 text-[10px] font-bold uppercase">{authError}</p>}
        </div>
    </div>);

    // ── Derived data ──────────────────────────────────────────────────
    const getLatestComm=(refId)=>{const t=communications.filter(c=>String(c.refId)===String(refId)).sort((a,b)=>new Date(b.date)-new Date(a.date));return t.length>0?t[0]:null;};

    const allPendingRecalls=dbRecords.filter(r=>r.trackingNumber==="PENDING RECALL");
    const allCompletedRecalls=dbRecords.filter(r=>(r.submittedBy||"").includes("Completed by:"));
    const allStandardRecords=dbRecords.filter(r=>r.trackingNumber!=="PENDING RECALL"&&!(r.submittedBy||"").includes("Completed by:")&&r.orderId);

    const pendingStandard=pending.filter(p=>p.type==='standard');
    const pendingRecallInits=pending.filter(p=>p.type==='recall_initiate');
    const pendingRecallCompletes=pending.filter(p=>p.type==='recall_complete');
    const pendingTicketCreates=pending.filter(p=>p.type==='ticket_create');
    const pendingTicketReplies=pending.filter(p=>p.type==='ticket_reply');

    const virtualPendingRecalls=pendingRecallInits.map(p=>({_pendingId:p.id,_isVirtual:true,_editedBadge:p.editedBadge,orderId:p.payload.orderId,status:p.payload.status,trackingNumber:"PENDING RECALL",courier:"ACTION REQUIRED",refundAmount:"0.00",submittedBy:p.createdBy,timestamp:p.createdAt,_managerComment:p.payload.comment,_managerLinks:p.payload.links,_managerFiles:p.payload.ticketFiles||[]}));
    const combinedPendingRecalls=[...virtualPendingRecalls,...allPendingRecalls];

    const isTicketTab=HD_CATS.includes(activeTab);
    const virtualPendingTickets=pendingTicketCreates.filter(p=>p.payload.category===activeTab).map(p=>({_isVirtual:true,_pendingId:p.id,_editedBadge:p.editedBadge,ticketId:"PENDING-"+p.id.slice(-6).toUpperCase(),date:p.createdAt,orderId:p.payload.orderId,category:p.payload.category,status:p.payload.status,createdBy:p.createdBy,_managerComment:p.payload.comment,_managerLinks:p.payload.links,_managerFiles:p.payload.ticketFiles||[]}));
    const realActiveTickets=tickets.filter(t=>t.category===activeTab&&t.status!=="Closed");
    const activeCategoryTickets=userRole==="MANAGER"?realActiveTickets:[...virtualPendingTickets,...realActiveTickets];
    const historyCategoryTickets=tickets.filter(t=>t.category===activeTab&&t.status==="Closed");
    const pendingTicketsThisCategory=pendingTicketCreates.filter(p=>p.payload.category===activeTab);

    const activeThread=activeTicket?(()=>{
        const threadKey=activeTicket.orderId;
        const msgs=[];
        const existingComms=communications.filter(c=>String(c.refId)===String(threadKey));
        if(activeTicket._isVirtual&&existingComms.length===0&&activeTicket._managerComment)
            msgs.push({date:activeTicket.date,refId:threadKey,author:activeTicket.createdBy,role:"MANAGER",comment:activeTicket._managerComment||"",links:activeTicket._managerLinks||"",files:activeTicket._managerFiles||[]});
        existingComms.forEach(c=>msgs.push({...c}));
        return msgs.sort((a,b)=>new Date(a.date)-new Date(b.date));
    })():[];

    // Badge counts
    const recallBadge=userRole==="MANAGER"?(pendingRecallInits.length+pendingRecallCompletes.length+allPendingRecalls.length):allPendingRecalls.length+virtualPendingRecalls.filter(v=>v.createdBy!==userEmail).length;
    const getHdBadge=(tabId)=>{
        if(userRole==="MANAGER"){
            const active=tickets.filter(t=>t.category===tabId&&t.status==="Waiting on Agent").length;
            const pend=pending.filter(p=>(p.type==='ticket_create'&&p.payload.category===tabId)||(p.type==='ticket_reply'&&p.payload.category===tabId)).length;
            return active+pend;
        } else {
            // Supplier sees count of tickets waiting for their response
            const active=tickets.filter(t=>t.category===tabId&&t.status==="Waiting on Supplier").length;
            const virt=pendingTicketCreates.filter(p=>p.payload.category===tabId&&p.createdBy!==userEmail).length;
            return active+virt;
        }
    };

    const renderPagination=(total,page,setPage)=>total<=1?null:(
    <div className="flex justify-between items-center mt-4 bg-[#0b0e14] p-3 rounded-xl border border-slate-800">
        <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1} className="px-4 py-2 bg-slate-800 text-slate-400 rounded-lg text-[10px] font-black uppercase disabled:opacity-30 hover:bg-slate-700">Previous</button>
        <span className="text-[10px] font-bold text-slate-500 uppercase">Page {page} of {total}</span>
        <button onClick={()=>setPage(p=>Math.min(total,p+1))} disabled={page===total} className="px-4 py-2 bg-slate-800 text-slate-400 rounded-lg text-[10px] font-black uppercase disabled:opacity-30 hover:bg-slate-700">Next</button>
    </div>);

    const stdTotalPages=Math.ceil(allStandardRecords.length/ITEMS);
    const recallHistoryPages=Math.ceil(allCompletedRecalls.length/ITEMS);
    const hdHistoryPages=Math.ceil(historyCategoryTickets.length/ITEMS);
    const paginatedStd=allStandardRecords.slice((currentPage-1)*ITEMS,currentPage*ITEMS);
    const paginatedRecallHistory=allCompletedRecalls.slice((currentPage-1)*ITEMS,currentPage*ITEMS);
    const paginatedHdHistory=historyCategoryTickets.slice((currentPage-1)*ITEMS,currentPage*ITEMS);

    const pcProps={userRole,userEmail,token,communications,setCommunications,loadDatabase,setSyncingItem,setSyncOverrides,setEditingPending,setEditForm,setEditBase64,setEditFiles,discardPending,isManagerRequestLocked,clearEditedBadge};

    return(
    <div className="min-h-screen p-4 md:p-8 flex flex-col items-center gap-8">

        <div className="w-full max-w-5xl">
            <div className="flex justify-between items-center border-b border-slate-800 pb-2">
                <div className="flex gap-3 overflow-x-auto custom-scrollbar pb-1 min-w-0">
                    {[
                        {id:'scanner',label:'Standard Scan',badge:pendingStandard.length>0&&userRole==="MANAGER"?pendingStandard.length:0,color:'blue'},
                        {id:'recalls',label:'Recalls',badge:recallBadge,color:'orange'},
                    ].map(t=>(
                    <button key={t.id} onClick={()=>switchTab(t.id)} className={`whitespace-nowrap px-3 font-black uppercase tracking-widest text-sm transition-all flex items-center gap-1.5 ${activeTab===t.id?`text-${t.color}-500 border-b-2 border-${t.color}-500`:'text-slate-600 hover:text-slate-400'}`}>
                        {t.label}{t.badge>0&&<span className={`bg-${t.color}-500 text-white text-[10px] px-1.5 py-0.5 rounded-full`}>{t.badge}</span>}
                    </button>))}
                    {HELPDESK_TABS.map(t=>{const b=getHdBadge(t.id);return(
                    <button key={t.id} onClick={()=>switchTab(t.id)} className={`whitespace-nowrap px-3 font-black uppercase tracking-widest text-sm transition-all flex items-center gap-1.5 ${activeTab===t.id?'text-purple-500 border-b-2 border-purple-500':'text-slate-600 hover:text-slate-400'}`}>
                        {t.label}{b>0&&<span className="bg-purple-500 text-white text-[10px] px-1.5 py-0.5 rounded-full">{b}</span>}
                    </button>);})}
                    <button onClick={()=>switchTab('search')} className={`whitespace-nowrap px-3 font-black uppercase tracking-widest text-sm transition-all ${activeTab==='search'?'text-emerald-500 border-b-2 border-emerald-500':'text-slate-600 hover:text-slate-400'}`}>🔍 Search</button>
                </div>
                <div className="flex items-center gap-3 ml-3">
                    <div className="text-[9px] text-slate-600 font-bold">{lastUpdated?`↻ ${Math.round((new Date()-lastUpdated)/1000)}s ago`:''}</div>

                    <div className="px-3 py-1 bg-slate-800 rounded-full whitespace-nowrap"><span className="text-[9px] font-black tracking-widest uppercase text-emerald-400">{userRole}</span></div>
                </div>
            </div>
        </div>

        {/* ── EDIT MODAL ── */}

                    <div onClick={()=>editFileInputRef.current.click()} className="border-2 border-dashed border-slate-800 rounded-xl p-4 flex items-center justify-center cursor-pointer hover:border-yellow-500 bg-[#0b0e14]/50">

                </div>
            </div>

                {(()=>{const p=syncingItem.payload||{};return(
                <div className="space-y-3 text-xs">
                    {p.orderId!==undefined&&<div><label className="text-[10px] text-slate-500 font-bold uppercase">Order ID</label><input defaultValue={p.orderId} onChange={e=>{if(e.target.value)setSyncOverrides({...syncOverrides,orderId:e.target.value});}} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-emerald-500 font-bold uppercase mt-1"/></div>}
                    {p.trackingNumber!==undefined&&<div><label className="text-[10px] text-slate-500 font-bold uppercase">Tracking</label><input defaultValue={p.trackingNumber} onChange={e=>{if(e.target.value)setSyncOverrides({...syncOverrides,trackingNumber:e.target.value});}} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-emerald-500 font-bold mt-1"/></div>}
                    {p.courier!==undefined&&<div><label className="text-[10px] text-slate-500 font-bold uppercase">Courier</label><select defaultValue={p.courier} onChange={e=>setSyncOverrides({...syncOverrides,courier:e.target.value})} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-emerald-500 font-bold mt-1"><option value="FedEx Ground">FedEx Ground</option><option value="Amazon">Amazon</option><option value="UPS">UPS</option><option value="USPS">USPS</option><option value="N/A">N/A</option></select></div>}
                    {p.productCost!==undefined&&<div className="grid grid-cols-3 gap-2">
                        <div><label className="text-[10px] text-slate-500 font-bold uppercase">Cost</label><input defaultValue={p.productCost} type="number" onChange={e=>{const c=parseFloat(e.target.value)||0,f=parseFloat(syncOverrides.returnFee||p.returnFee)||0;setSyncOverrides({...syncOverrides,productCost:e.target.value,refundAmount:(c-f).toFixed(2)});}} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-2 text-white outline-none focus:border-emerald-500 font-bold mt-1"/></div>
                        <div><label className="text-[10px] text-slate-500 font-bold uppercase">Fee</label><input defaultValue={p.returnFee} type="number" onChange={e=>{const f=parseFloat(e.target.value)||0,c=parseFloat(syncOverrides.productCost||p.productCost)||0;setSyncOverrides({...syncOverrides,returnFee:e.target.value,refundAmount:(c-f).toFixed(2)});}} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-2 text-white outline-none focus:border-emerald-500 font-bold mt-1"/></div>
                        <div><label className="text-[10px] text-slate-500 font-bold uppercase">Refund</label><input value={syncOverrides.refundAmount||p.refundAmount} readOnly className="w-full bg-[#0b0e14] border border-emerald-500/30 rounded-xl p-2 text-emerald-400 font-bold mt-1"/></div>
                    </div>}
                    {p.status!==undefined&&userRole==="MANAGER"&&<div><label className="text-[10px] text-slate-500 font-bold uppercase">Status</label><select defaultValue={p.status} onChange={e=>setSyncOverrides({...syncOverrides,status:e.target.value})} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-emerald-500 font-bold mt-1"><option value="Open">Open</option><option value="Closed">Closed</option><option value="Waiting on Supplier">Waiting on Supplier</option><option value="Waiting on Agent">Waiting on Agent</option></select></div>}
                    {p.comment!==undefined&&<div><label className="text-[10px] text-slate-500 font-bold uppercase">Comment</label><textarea defaultValue={p.comment} rows="2" onChange={e=>{if(e.target.value)setSyncOverrides({...syncOverrides,comment:e.target.value});}} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-emerald-500 font-bold custom-scrollbar mt-1"></textarea></div>}
                    <button onClick={()=>syncPending(syncingItem.id,syncOverrides)} disabled={status==='syncing'} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-xl font-black text-sm tracking-widest uppercase disabled:opacity-50 transition-all mt-4">{status==='syncing'?'Approving...':'✓ Approve & Save'}</button>
                </div>);})()}
            </div>
        </div>
        )}

        {/* ══════════════════════════════════════════════════════════════ */}
        {/* SEARCH TAB                                                     */}
        {/* ══════════════════════════════════════════════════════════════ */}
        {activeTab==='search'&&(
        <div className="w-full max-w-3xl animate-fade-in">
            <div className="bg-[#161b22] border border-slate-800 rounded-[2rem] p-8 shadow-2xl">
                <h1 className="text-xl font-black text-white tracking-widest italic uppercase mb-6">Unified Search</h1>
                <div className="flex gap-3 mb-6">
                    <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')runSearch(searchQuery);}} placeholder="Search Order ID, Tracking, Ticket ID..." className="flex-1 bg-[#0b0e14] border border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-emerald-500 font-bold uppercase tracking-widest"/>
                    <button onClick={()=>runSearch(searchQuery)} className="bg-emerald-500 hover:bg-emerald-600 text-white px-6 rounded-2xl font-black text-sm tracking-widest uppercase transition-all">Search</button>
                </div>
                {searchResult&&(
                <div className="space-y-6 animate-fade-in">
                    {/* Summary bar */}
                    <div className="flex items-center justify-between">
                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Order ID: <span className="text-white">{searchResult.query}</span></p>
                        <p className="text-[10px] text-slate-500 font-bold uppercase">{searchResult.messages.length} messages • {searchResult.records.length} records • {searchResult.tickets.length} tickets</p>
                    </div>

                    {/* Order / Return record info if exists */}
                    {searchResult.records.length>0&&(
                    <div className="space-y-2">
                        {searchResult.records.map((rec,i)=>(
                        <div key={i} className="bg-[#0b0e14] border border-slate-700 rounded-2xl p-4 flex justify-between items-center">
                            <div>
                                <p className="text-white font-black text-sm">{rec.orderId} <span className="text-[9px] text-slate-500 ml-2 uppercase">{rec.courier} • {rec.trackingNumber}</span></p>
                                <p className="text-[10px] text-slate-400 mt-0.5">Refund: <span className="text-blue-400 font-bold">${rec.refundAmount}</span> • {new Date(rec.timestamp).toLocaleDateString()}</p>
                            </div>
                            {rec.link&&rec.link!=="No Image"&&<button onClick={()=>downloadFiles(rec.link)} className="bg-blue-500/20 border border-blue-500 text-blue-400 hover:bg-blue-500/30 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all">⬇ Label</button>}
                        </div>))}
                    </div>)}

                    {/* Ticket info if exists */}
                    {searchResult.tickets.length>0&&(
                    <div className="space-y-2">
                        {searchResult.tickets.map((t,i)=>(
                        <div key={i} className="bg-[#0b0e14] border border-slate-700 rounded-xl px-4 py-2 flex justify-between items-center">
                            <p className="text-[10px] text-slate-400 uppercase">{t.category} <span className="text-slate-600 font-mono ml-2">{t.ticketId}</span></p>
                            <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded-full ${t.status==='Closed'?'bg-slate-800 text-slate-400':t.status==='Waiting on Supplier'?'bg-orange-500/20 text-orange-400':'bg-purple-500/20 text-purple-400'}`}>{t.status}</span>
                        </div>))}
                    </div>)}

                    {/* Full unified conversation — all messages for this order ID */}
                    {searchResult.messages.length>0?(
                    <div className="bg-[#0b0e14] border border-slate-800 rounded-2xl overflow-hidden">
                        <div className="px-4 py-3 border-b border-slate-800">

                        </div>
                        <div className="p-4 space-y-4 max-h-[60vh] overflow-y-auto custom-scrollbar">

                                <div key={i} className={`flex flex-col ${isMe?'items-end':'items-start'}`}>

                                    <div className={`px-4 py-3 rounded-2xl max-w-[80%] ${isMe?'bg-purple-600/20 border border-purple-500/30 text-white':'bg-slate-800 border border-slate-700 text-slate-200'}`}>

        </div>
        )}

        {/* ══════════════════════════════════════════════════════════════ */}
        {/* STANDARD SCAN TAB                                             */}
        {/* ══════════════════════════════════════════════════════════════ */}
        {activeTab==='scanner'&&(

                        <div><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Courier</label><select value={courier} onChange={e=>setCourier(e.target.value)} className="w-full bg-[#0b0e14] border border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 font-bold text-sm cursor-pointer mt-1"><option value="" disabled>Select</option><option>FedEx Ground</option><option>Amazon</option><option>UPS</option><option>USPS</option></select></div>
                    </div>
                    <div className="grid grid-cols-2 gap-4">

                        </div>
                    </div>
                    <button onClick={handleStdSubmit} disabled={!orderId||!courier||status==='scanning'||status==='syncing'} className={`w-full py-5 rounded-2xl font-black text-lg tracking-widest transition-all ${orderId&&courier&&status!=='scanning'&&status!=='syncing'?'bg-blue-600 text-white hover:bg-blue-500':'bg-slate-800 text-slate-600'}`}>

            {/* Pending - Supplier */}
            {userRole!=="MANAGER"&&pendingStandard.filter(p=>p.createdBy===userEmail).length>0&&(<div><h2 className="text-[10px] font-black text-blue-400 tracking-[0.2em] uppercase mb-3 ml-2">⏳ My Pending ({pendingStandard.filter(p=>p.createdBy===userEmail).length})</h2>{pendingStandard.filter(p=>p.createdBy===userEmail).map(item=><PendingCard key={item.id} item={item} accentColor="blue" {...pcProps}/>)}</div>)}
            {/* History */}
            <div>
                <h2 className="text-[10px] font-black text-slate-500 tracking-[0.2em] uppercase mb-3 ml-2">Standard Return History</h2>
                <div className="space-y-3">
                    {paginatedStd.map((rec,i)=>{const lc=getLatestComm(rec.orderId);return(
                    <div key={i} className="bg-[#161b22] border border-slate-700 rounded-2xl p-5 hover:border-blue-500/50 transition-all">
                        <div className="flex justify-between items-center">
                            <div><p className="text-white font-black text-sm">{rec.orderId}</p><p className="text-[10px] text-slate-400 uppercase">{rec.courier} • {rec.trackingNumber}</p></div>

        {activeTab==='recalls'&&(
        <div className="w-full max-w-xl space-y-8 animate-fade-in">

            <div className="bg-[#161b22] border border-orange-500/30 rounded-[2rem] p-8 shadow-2xl">

                    </div>
                    <textarea value={recallComment} onChange={e=>setRecallComment(e.target.value)} placeholder="Comment..." rows="2" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-orange-500 font-bold text-xs custom-scrollbar"/>
                    <div onClick={()=>recallFileInputRef.current.click()} className="border border-slate-700 rounded-xl p-3 flex items-center justify-center cursor-pointer hover:border-orange-500 bg-[#0b0e14]">

                    <button onClick={initiateRecall} disabled={!recallOrderId||status==='syncing'} className="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-xl font-black uppercase tracking-widest text-sm disabled:opacity-50 transition-all">{status==='syncing'?'Sending...':'Send Request to Supplier'}</button>
                </div>
            </div>

                            {mc.links&&<a href={mc.links} target="_blank" className="text-[10px] text-blue-400 underline mt-1 block">{mc.links}</a>}
                        </div>)}

                        <div className="mt-4 pt-4 border-t border-slate-800 space-y-4 animate-fade-in">
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[9px] text-slate-500 font-bold uppercase">Tracking *</label><input onChange={e=>setTrackingNumber(e.target.value)} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white font-bold text-xs outline-none focus:border-orange-500 mt-1"/></div>

                                <div><label className="text-[9px] text-slate-500 font-bold uppercase">Cost *</label><input type="number" onChange={e=>setProductCost(e.target.value)} placeholder="$" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white font-bold text-xs outline-none focus:border-orange-500 mt-1"/></div>
                                <div><label className="text-[9px] text-slate-500 font-bold uppercase">Fee *</label><input type="number" onChange={e=>setReturnFee(e.target.value)} placeholder="$" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white font-bold text-xs outline-none focus:border-orange-500 mt-1"/></div>
                            </div>
                            <div className="space-y-3 pt-3 border-t border-slate-800">
                                <div className="grid grid-cols-2 gap-3">
                                    {userRole==="MANAGER"?<select value={recallStatus} onChange={e=>setRecallStatus(e.target.value)} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-orange-500 font-bold text-xs"><option value="Closed">Closed</option><option value="Waiting on Agent">Waiting on Agent</option></select>:<div className="bg-[#0b0e14] border border-orange-500/30 rounded-xl p-3 text-orange-400 font-black text-xs">Waiting on Manager</div>}

                            </div>

                    </div>
                </div>
                {/* Manager: pending new tickets section */}
                {userRole==="MANAGER"&&pendingTicketsThisCategory.length>0&&(
                <div className="mb-6">

                        const hasPending=!t._isVirtual&&pendingTicketReplies.some(p=>String(p.payload.ticketId)===String(t.ticketId));

                        return(<div key={i} onClick={()=>{if(showEdited)clearEditedBadge(t._pendingId);setActiveTicket(t);setHdStatus('');}} className={`bg-[#0b0e14] border ${hasPending?'border-yellow-500/50':'border-slate-700'} hover:border-purple-500/50 rounded-2xl p-5 cursor-pointer transition-all flex justify-between items-center`}>
                            <div className="flex items-center gap-3 flex-wrap">
                                <span className="text-white font-black text-sm">{t.orderId}</span>
                                <span className="text-slate-500 text-[10px] font-mono">{t.ticketId}</span>
                                {showEdited&&<span className="text-[9px] font-black uppercase text-yellow-400 bg-yellow-500/10 px-2 py-0.5 rounded-full pulse-ring">✏️ Edited</span>}
                                {hasPending&&userRole==="MANAGER"&&<span className="text-[9px] font-black uppercase text-yellow-400 bg-yellow-500/10 px-2 py-0.5 rounded-full pulse-ring">Pending Reply</span>}
                            </div>
                            <span className={`text-[10px] font-black uppercase px-3 py-1 rounded-full ${t.status==='Waiting on Supplier'||t.status==='Waiting on Manager'?'bg-orange-500/20 text-orange-400':'bg-purple-500/20 text-purple-400'}`}>{t.status}</span>

                {/* History */}
                <h2 className="text-[10px] font-black text-slate-500 tracking-[0.2em] uppercase mb-3 mt-6 border-t border-slate-800 pt-5">Ticket History (Closed)</h2>

                    <div key={i} onClick={()=>{setActiveTicket(t);setHdStatus('');}} className="bg-[#0b0e14] border border-slate-800 hover:border-slate-600 rounded-2xl p-5 cursor-pointer transition-all flex justify-between items-center opacity-70 hover:opacity-100">
                        <div className="flex items-center gap-3"><span className="text-slate-300 font-black text-sm">{t.orderId}</span><span className="text-slate-500 text-[10px] font-mono">{t.ticketId}</span></div>

                            <span className="text-[10px] font-black uppercase px-3 py-1 rounded-full bg-slate-800 text-slate-400">Closed</span>
                            {/* Download button in history */}
                            {(()=>{const comms=communications.filter(c=>String(c.refId)===String(t.orderId));const filesExist=comms.some(c=>c.files&&c.files.length>0);return filesExist?<button onClick={e=>{e.stopPropagation();const allFiles=comms.flatMap(c=>c.files||[]);downloadFiles(allFiles.join(" , "));}} className="bg-purple-500/20 border border-purple-500 text-purple-400 hover:bg-purple-500/30 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all">⬇</button>:null;})()}
                        </div>
                    </div>))}
                </div>
                {renderPagination(hdHistoryPages,currentPage,setCurrentPage)}
            </div>
            )}

            {/* Create / Raise ticket form */}
            {showCreateTicket&&(
            <div className="bg-[#161b22] border border-purple-500/30 rounded-[2rem] p-8 shadow-2xl animate-fade-in">
                <h2 className="text-sm font-black text-purple-500 tracking-widest uppercase mb-6 flex justify-between items-center">
                    {userRole==="MANAGER"?'Open New Ticket':'Raise Request to Manager'}
                    <button onClick={()=>{setShowCreateTicket(false);resetHD();}} className="text-slate-500 hover:text-white">✕</button>
                </h2>
                <div className="space-y-4">
                    <input value={hdOrderId} onChange={e=>setHdOrderId(e.target.value)} placeholder="ORDER ID *" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-purple-500 font-bold uppercase"/>
                    {userRole==="MANAGER"?<select value={hdStatus} onChange={e=>setHdStatus(e.target.value)} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-purple-500 font-bold text-sm"><option value="" disabled>Status *</option><option value="Open">Open</option><option value="Waiting on Supplier">Waiting on Supplier</option><option value="Closed">Closed</option></select>:<div className="bg-[#0b0e14] border border-purple-500/30 rounded-xl p-4 text-purple-400 font-black text-sm">Status: Waiting on Manager</div>}
                    {activeTab==="Refund request"&&<div><label className="text-[10px] text-slate-500 font-bold uppercase">Refund Amount</label><input type="number" value={hdRefundAmount} onChange={e=>setHdRefundAmount(e.target.value)} placeholder="$0.00" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-purple-500 font-bold mt-1"/></div>}
                    <textarea value={hdComment} onChange={e=>setHdComment(e.target.value)} placeholder="Details..." rows="3" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-purple-500 font-bold text-sm custom-scrollbar"/>
                    <input value={hdLinks} onChange={e=>setHdLinks(e.target.value)} placeholder="Links (Optional)" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-purple-500 font-bold text-sm"/>
                    <div onClick={()=>hdFileInputRef.current.click()} className="border-2 border-dashed border-slate-800 rounded-xl p-4 flex items-center justify-center cursor-pointer hover:border-purple-500 bg-[#0b0e14]/50">
                        <input type="file" multiple accept=".jpg,.jpeg,.png,.pdf" ref={hdFileInputRef} onChange={e=>processFiles(e,setHdFiles,setHdBase64Files)} className="hidden"/>
                        {hdFiles.length>0?<p className="text-purple-400 font-bold text-xs uppercase">{hdFiles.length} File(s)</p>:<p className="text-slate-500 text-xs font-bold uppercase">Attach Files</p>}
                    </div>
                    <button onClick={submitNewTicket} disabled={(!hdStatus&&userRole==="MANAGER")||!hdOrderId||status==='syncing'} className="w-full bg-purple-600 hover:bg-purple-500 text-white py-4 rounded-xl font-black text-sm tracking-widest uppercase disabled:opacity-30 transition-all">{status==='syncing'?'Sending...':userRole==="MANAGER"?'Send Request to Supplier':'Send Request to Manager'}</button>
                </div>
            </div>
            )}

            {/* Ticket detail / chat */}
            {activeTicket&&(
            <div className="bg-[#161b22] border border-slate-800 rounded-[2rem] shadow-2xl flex flex-col animate-fade-in" style={{height:'80vh'}}>
                <div className="p-6 border-b border-slate-800 flex justify-between items-center bg-[#0b0e14] rounded-t-[2rem]">
                    <div>
                        <h2 className="text-white font-black text-xl">{activeTicket.orderId}</h2>
                        <p className="text-slate-400 text-xs font-bold">{activeTicket.category} • <span className="text-purple-400">{activeTicket.status}</span></p>
                        {activeTicket._isVirtual&&<span className="text-[9px] font-black text-orange-400 bg-orange-500/10 px-2 py-0.5 rounded-full">Pre-Approval</span>}
                    </div>
                    <button onClick={()=>{setActiveTicket(null);resetHD();}} className="bg-slate-800 text-white px-4 py-2 rounded-full text-xs font-black uppercase hover:bg-slate-700">Back</button>
                </div>
                <div className="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar bg-[#0b0e14]/30">
                    {activeThread.map((msg,i)=>{const isMe=msg.role===userRole;return(
                    <div key={i} className={`flex flex-col ${isMe?'items-end':'items-start'}`}>
                        <span className="text-[9px] font-bold text-slate-500 mb-1 uppercase">{msg.role} • {new Date(msg.date).toLocaleDateString()}</span>
                        <div className={`p-4 rounded-2xl max-w-[85%] ${isMe?'bg-purple-600/20 border border-purple-500/30 text-white':'bg-slate-800 border border-slate-700 text-slate-200'}`}>
                            {msg.comment&&<p className="text-sm font-medium whitespace-pre-wrap">{msg.comment}</p>}
                            {msg.links&&<a href={msg.links} target="_blank" className="text-blue-400 text-xs font-bold underline mt-2 block break-all">{msg.links}</a>}
                            {msg.files&&msg.files.length>0&&<div className="mt-3 flex gap-2 flex-wrap">{msg.files.map((url,idx)=><div key={idx} className="flex gap-1 items-center"><a href={url} target="_blank" className="bg-[#0b0e14] border border-slate-700 px-3 py-1 rounded-lg text-[10px] font-bold text-slate-300 hover:text-purple-400">📎 {idx+1}</a><button onClick={()=>downloadFiles(url)} className="text-blue-400 hover:text-blue-300 text-[10px]">⬇</button></div>)}</div>}
                        </div>
                    </div>);})}
                </div>
                <div className="p-6 border-t border-slate-800 bg-[#161b22] rounded-b-[2rem]">
                    <div className="space-y-3">
                        {activeTab==="Refund request"&&<input type="number" value={hdRefundAmount} onChange={e=>setHdRefundAmount(e.target.value)} placeholder="Refund Amount ($)" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-purple-500 font-bold text-sm"/>}
                        <textarea value={hdComment} onChange={e=>setHdComment(e.target.value)} placeholder="Type a message..." rows="2" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-purple-500 font-bold text-sm custom-scrollbar"/>
                        <div className="flex gap-3">
                            {userRole==="MANAGER"&&<select value={hdStatus} onChange={e=>setHdStatus(e.target.value)} className="flex-1 bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-purple-500 font-bold text-xs"><option value="">Status (opt)</option><option value="Open">Open</option><option value="Waiting on Supplier">Waiting on Supplier</option><option value="Closed">Closed</option></select>}
                            {userRole!=="MANAGER"&&<div className="flex-1 bg-[#0b0e14] border border-purple-500/30 rounded-xl p-3 text-purple-400 font-black text-xs">Waiting on Manager</div>}
                            <input value={hdLinks} onChange={e=>setHdLinks(e.target.value)} placeholder="Link (Opt)" className="flex-1 bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-purple-500 font-bold text-xs"/>
                            <div onClick={()=>hdFileInputRef.current.click()} className="flex-1 border border-slate-700 rounded-xl p-3 flex items-center justify-center cursor-pointer hover:border-purple-500 bg-[#0b0e14]">
                                <input type="file" multiple accept=".jpg,.jpeg,.png,.pdf" ref={hdFileInputRef} onChange={e=>processFiles(e,setHdFiles,setHdBase64Files)} className="hidden"/>
                                <span className="text-slate-400 text-xs font-bold uppercase">{hdFiles.length>0?`${hdFiles.length} Files`:'📎'}</span>
                            </div>
                        </div>
                        <button onClick={sendMessage} disabled={!hdComment&&!hdLinks&&hdBase64Files.length===0} className="w-full bg-purple-600 hover:bg-purple-500 text-white py-3 rounded-xl font-black text-xs tracking-widest uppercase disabled:opacity-30 transition-all">Send Message</button>
                    </div>
                </div>
            </div>
            )}
        </div>
        )}
    </div>
    );
}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
