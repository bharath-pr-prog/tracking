<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Tracker Pro - Secure</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tesseract.js@v5.0.2/dist/tesseract.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background-color: #0b0e14; color: #cbd5e1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0b0e14; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ====================================================================
        // YOUR SECURE LINKS
        // ====================================================================
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwUjnJd-Cf5UO9yRJn8bqBUarLi7ZHqngSwKsolwe93SKtqdNxkJtwLwJvFhYkRggy_/exec"; 
        const GOOGLE_CLIENT_ID = "1003946395665-5lclr3984nj3h2gacunplf45sa4lh4ej.apps.googleusercontent.com"; 
        // ====================================================================

        function App() {
            // Security States
            const [isAuth, setIsAuth] = useState(false);
            const [token, setToken] = useState(null);
            const [authError, setAuthError] = useState("");
            const [userEmail, setUserEmail] = useState("");

            // App States
            const [orderId, setOrderId] = useState('');
            const [files, setFiles] = useState([]);
            const [base64Images, setBase64Images] = useState([]);
            const [extracted, setExtracted] = useState({ trk: '', courier: '' });
            const [status, setStatus] = useState('idle');
            const [dbRecords, setDbRecords] = useState([]);
            const [productCost, setProductCost] = useState('');
            const [returnFee, setReturnFee] = useState('');
            const fileInputRef = useRef(null);

            // --- THE LOGIN HANDLER (With Emergency Debug) ---
            const handleCredentialResponse = async (response) => {
                const jwtToken = response.credential;
                setAuthError("Verifying with secure database...");

                try {
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?token=${jwtToken}`);
                    const data = await res.json();

                    if (data.error) {
                        setAuthError(`Access Denied: ${data.debug || data.error}`);
                    } else {
                        setToken(jwtToken);
                        setUserEmail(data[0]?.submittedBy || "Authorized User");
                        setDbRecords(Array.isArray(data) ? data : []);
                        setIsAuth(true);
                        setAuthError("");
                    }
                } catch (e) {
                    setAuthError("Connection Failed: Check if your Google Script URL is correct and deployed as a 'Web App'.");
                }
            };

            useEffect(() => {
                if (isAuth) return;
                
                const renderButton = () => {
                    if (window.google && document.getElementById("googleSignInDiv")) {
                        window.google.accounts.id.initialize({
                            client_id: GOOGLE_CLIENT_ID,
                            callback: handleCredentialResponse
                        });
                        window.google.accounts.id.renderButton(
                            document.getElementById("googleSignInDiv"),
                            { theme: "outline", size: "large", text: "continue_with" }
                        );
                    }
                };

                // Retry logic to ensure Google script is loaded
                if (window.google) {
                    renderButton();
                } else {
                    const timer = setInterval(() => {
                        if (window.google) {
                            clearInterval(timer);
                            renderButton();
                        }
                    }, 200);
                }
            }, [isAuth]);

            // --- APP LOGIC ---
            const loadDatabase = async () => {
                if (!token) return;
                try {
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?token=${token}`);
                    const data = await response.json();
                    if (Array.isArray(data)) setDbRecords(data);
                } catch (e) { console.error("Database sync error"); }
            };

            const getDirectDownload = (url) => {
                if (!url || !url.includes('/d/')) return url;
                try {
                    const fileId = url.split('/d/')[1].split('/')[0];
                    return `https://drive.google.com/uc?export=download&id=${fileId}`;
                } catch (e) { return url; }
            };

            const parseLabelText = (text) => {
                const cleanText = text.toUpperCase().replace(/\n/g, ' ');
                let courier = "Unknown";
                if (cleanText.includes("FEDEX")) courier = "FedEx Ground";
                if (cleanText.includes("UPS") || cleanText.includes("1Z")) courier = "UPS";
                
                const fedexRegex = /(?:TRK|TRACKING|TRK#|TRKE)\s*[:#]?\s*([\d\s]{12,25})/gi;
                const matches = [...cleanText.matchAll(fedexRegex)];
                let foundTrks = matches.map(m => m[1].replace(/[^0-9]/g, '').substring(0, 12)).filter(d => d.length >= 12);
                let uniqueTrks = [...new Set(foundTrks)];

                return { 
                    trk: uniqueTrks.length > 0 ? uniqueTrks.join(" , ") : "Not Found", 
                    courier: (uniqueTrks.length > 0 && courier === "Unknown") ? "FedEx Ground" : courier 
                };
            };

            const handleFileUpload = async (e) => {
                const upFiles = Array.from(e.target.files);
                if (upFiles.length === 0) return;
                setFiles(upFiles); 
                setStatus('scanning');
                try {
                    let allBase64 = [];
                    let combinedText = "";
                    for (let f of upFiles) {
                        const base64 = await new Promise(r => {
                            const reader = new FileReader();
                            reader.onloadend = () => r(reader.result);
                            reader.readAsDataURL(f);
                        });
                        allBase64.push(base64);
                        const { data: { text } } = await Tesseract.recognize(f, 'eng');
                        combinedText += text + " ";
                    }
                    setBase64Images(allBase64);
                    setExtracted(parseLabelText(combinedText)); 
                    setStatus('ready');
                } catch (err) { setStatus('idle'); }
            };

            const handleSync = async () => {
                setStatus('syncing');
                const refund = (parseFloat(productCost) || 0) - (parseFloat(returnFee) || 0);
                const payload = { 
                    token, orderId, trackingNumber: extracted.trk, 
                    courier: extracted.courier, images: base64Images, 
                    productCost, returnFee, refundAmount: refund.toFixed(2)
                };
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setStatus('success');
                    setTimeout(() => { 
                        setOrderId(''); setProductCost(''); setReturnFee(''); 
                        setFiles([]); setBase64Images([]); setExtracted({ trk: '', courier: '' }); 
                        setStatus('idle'); loadDatabase(); 
                    }, 1500);
                } catch (e) { setStatus('ready'); }
            };

            if (!isAuth) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[#0b0e14]">
                        <div className="max-w-md w-full bg-[#161b22] border border-slate-800 rounded-[2rem] p-10 shadow-2xl flex flex-col items-center text-center">
                            <div className="w-16 h-16 bg-blue-600/20 rounded-full flex items-center justify-center mb-6">
                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#3b82f6" viewBox="0 0 16 16"><path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM5 8h6a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/></svg>
                            </div>
                            <h1 className="text-2xl font-black text-white tracking-widest uppercase mb-2">Secure Gateway</h1>
                            <p className="text-slate-500 text-sm mb-8">Sign in with an authorized Google account.</p>
                            <div id="googleSignInDiv"></div>
                            {authError && (
                                <div className="mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl">
                                    <p className="text-red-400 text-[10px] font-bold leading-relaxed uppercase tracking-wider">{authError}</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6 md:p-12 flex flex-col items-center gap-10">
                    <div className="w-full max-w-xl bg-[#161b22] border border-slate-800 rounded-[2rem] p-8 shadow-2xl">
                        <div className="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
                            <div>
                                <h1 className="text-xl font-black text-white tracking-widest italic uppercase">Label Scanner</h1>
                                <p className="text-[9px] text-emerald-400 font-bold mt-1 tracking-tighter">✓ Authorized session active</p>
                            </div>
                            <button onClick={loadDatabase} className="text-[9px] font-bold text-blue-500 border border-blue-500/20 px-3 py-1 rounded-full uppercase hover:bg-blue-500/10">Refresh</button>
                        </div>

                        <div className="space-y-6">
                            <input value={orderId} onChange={(e) => setOrderId(e.target.value)} placeholder="ORDER ID" className="w-full bg-[#0b0e14] border border-slate-700 rounded-2xl p-5 text-white outline-none focus:border-blue-500 font-bold placeholder:text-slate-800 uppercase tracking-widest"/>

                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-2">
                                    <label className="text-[10px] text-slate-600 font-bold uppercase ml-2">Cost</label>
                                    <input type="number" value={productCost} onChange={(e) => setProductCost(e.target.value)} placeholder="0.00" className="w-full bg-[#0b0e14] border border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 font-bold"/>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] text-slate-600 font-bold uppercase ml-2">Fee</label>
                                    <input type="number" value={returnFee} onChange={(e) => setReturnFee(e.target.value)} placeholder="0.00" className="w-full bg-[#0b0e14] border border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-red-500 font-bold"/>
                                </div>
                            </div>

                            <div onClick={() => fileInputRef.current.click()} className="border-2 border-dashed border-slate-800 rounded-2xl p-10 flex flex-col items-center justify-center cursor-pointer hover:border-blue-600 transition-all bg-[#0b0e14]/50">
                                <input type="file" multiple ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                                {files.length > 0 ? (
                                    <p className="text-blue-400 font-black tracking-widest uppercase">{files.length} Selected</p>
                                ) : (
                                    <p className="text-slate-700 text-xs font-black uppercase tracking-widest">Select Documents</p>
                                )}
                            </div>

                            {status !== 'idle' && (
                                <div className="bg-[#0b0e14] p-5 rounded-2xl border border-slate-800 grid grid-cols-2 gap-4">
                                    <div><p className="text-[9px] text-slate-600 font-bold uppercase">Tracking</p><p className="font-mono text-white font-bold text-xs">{extracted.trk || '...'}</p></div>
                                    <div className="text-right"><p className="text-[9px] text-slate-600 font-bold uppercase">Courier</p><p className="text-blue-500 font-black italic text-xs">{extracted.courier || '...'}</p></div>
                                </div>
                            )}

                            <button onClick={handleSync} disabled={status !== 'ready' || !orderId} className={`w-full py-5 rounded-2xl font-black text-lg tracking-widest transition-all ${status==='ready'?'bg-blue-600 text-white shadow-xl shadow-blue-600/20':'bg-slate-800 text-slate-600'}`}>
                                {status === 'syncing' ? 'SYNCING...' : status === 'success' ? '✓ SUCCESS' : 'SYNC TO DATABASE'}
                            </button>
                        </div>
                    </div>

                    <div className="w-full max-w-2xl bg-[#161b22] border border-slate-800 rounded-[2.5rem] p-8 shadow-2xl">
                        <h2 className="text-[10px] font-black text-slate-600 uppercase tracking-[0.4em] mb-6 border-b border-slate-800 pb-4">Live Records</h2>
                        <div className="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                            {dbRecords.map((rec, i) => (
                                <div key={i} className="flex justify-between items-center bg-[#0b0e14] p-5 rounded-2xl border border-slate-800">
                                    <div className="flex-1">
                                        <p className="text-white font-black text-sm">{rec.orderId}</p>
                                        <p className="text-[9px] text-slate-600 font-mono mt-1">{rec.trackingNumber}</p>
                                    </div>
                                    {rec.link && rec.link !== "No Image" && (
                                        <div className="flex gap-2">
                                            {rec.link.split(" , ").map((url, idx) => (
                                                <a key={idx} href={getDirectDownload(url)} className="bg-slate-800 hover:bg-blue-600 text-white px-3 py-2 rounded-lg text-[10px] font-black uppercase transition-all">Doc {idx + 1}</a>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
