<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Tracker Pro - Secure</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tesseract.js@v5.0.2/dist/tesseract.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background-color: #0b0e14; color: #cbd5e1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 5px; width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0b0e14; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwUjnJd-Cf5UO9yRJn8bqBUarLi7ZHqngSwKsolwe93SKtqdNxkJtwLwJvFhYkRggy_/exec"; 
        const GOOGLE_CLIENT_ID = "1003946395665-5lclr3984nj3h2gacunplf45sa4lh4ej.apps.googleusercontent.com"; 

        const ITEMS_PER_PAGE = 50; 

        function App() {
            const [isAuth, setIsAuth] = useState(false);
            const [token, setToken] = useState(null);
            const [authError, setAuthError] = useState("");
            const [userRole, setUserRole] = useState("SUPPLIER"); 
            
            const [activeTab, setActiveTab] = useState('scanner'); 
            const [dbRecords, setDbRecords] = useState([]);
            const [tickets, setTickets] = useState([]); 
            const [status, setStatus] = useState('idle');
            
            const [searchQuery, setSearchQuery] = useState('');
            const [currentPage, setCurrentPage] = useState(1);

            useEffect(() => { setCurrentPage(1); }, [activeTab, searchQuery]);

            const [orderId, setOrderId] = useState('');
            const [trackingNumber, setTrackingNumber] = useState(''); 
            const [courier, setCourier] = useState(''); 
            const [productCost, setProductCost] = useState('');
            const [returnFee, setReturnFee] = useState('');
            const [files, setFiles] = useState([]);
            const [base64Images, setBase64Images] = useState([]);
            const fileInputRef = useRef(null);

            const [recallOrderId, setRecallOrderId] = useState('');
            const [resolvingId, setResolvingId] = useState(null); 

            const [activeTicket, setActiveTicket] = useState(null);
            const [showCreateTicket, setShowCreateTicket] = useState(false);
            
            const [hdOrderId, setHdOrderId] = useState('');
            const [hdStatus, setHdStatus] = useState('');
            const [hdComment, setHdComment] = useState('');
            const [hdLinks, setHdLinks] = useState('');
            const [hdFiles, setHdFiles] = useState([]);
            const [hdBase64Files, setHdBase64Files] = useState([]);
            const hdFileInputRef = useRef(null);

            const HELPDESK_TABS = [
                { id: "Tracking related issue", label: "Tracking" },
                { id: "Damage claims replacement/reship request", label: "Damage Claims" },
                { id: "General issues", label: "Issues" },
                { id: "Order modification", label: "Order Mods" }
            ];
            const HELPDESK_CATEGORIES = HELPDESK_TABS.map(t => t.id);

            const handleCredentialResponse = async (response) => {
                const jwtToken = response.credential;
                setAuthError("Verifying with secure database...");
                try {
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?token=${jwtToken}`);
                    const data = await res.json();
                    if (data.error) {
                        setAuthError(`Access Denied: ${data.debug || data.error}`);
                    } else {
                        setToken(jwtToken);
                        setUserRole(data.role ? data.role.toUpperCase() : "SUPPLIER");
                        setDbRecords(Array.isArray(data.records) ? data.records : []);
                        setTickets(Array.isArray(data.tickets) ? data.tickets : []);
                        setIsAuth(true);
                        setAuthError("");
                    }
                } catch (e) { setAuthError("Connection Failed."); }
            };

            useEffect(() => {
                if (isAuth) return;
                const renderButton = () => {
                    if (window.google && document.getElementById("googleSignInDiv")) {
                        window.google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleCredentialResponse });
                        window.google.accounts.id.renderButton(document.getElementById("googleSignInDiv"), { theme: "outline", size: "large", text: "continue_with" });
                    }
                };
                if (window.google) renderButton();
                else { const timer = setInterval(() => { if (window.google) { clearInterval(timer); renderButton(); } }, 200); }
            }, [isAuth]);

            const loadDatabase = async () => {
                if (!token) return;
                try {
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?token=${token}`);
                    const data = await response.json();
                    if (Array.isArray(data.records)) setDbRecords(data.records);
                    if (Array.isArray(data.tickets)) setTickets(data.tickets);
                } catch (e) {}
            };

            const switchTab = (tabName) => {
                setActiveTab(tabName);
                setShowCreateTicket(false);
                setActiveTicket(null);
                setSearchQuery('');
            };

            const handleHelpdeskFileUpload = async (e) => {
                const upFiles = Array.from(e.target.files);
                if (upFiles.length === 0) return;
                setHdFiles(upFiles);
                setStatus('reading_files');
                try {
                    let allBase64 = [];
                    for (let f of upFiles) {
                        const base64 = await new Promise(r => { const reader = new FileReader(); reader.onloadend = () => r(reader.result); reader.readAsDataURL(f); });
                        allBase64.push(base64);
                    }
                    setHdBase64Files(allBase64);
                    setStatus('idle');
                } catch (err) { setStatus('idle'); }
            };

            const resetHelpdeskForm = () => { setHdOrderId(''); setHdStatus(''); setHdComment(''); setHdLinks(''); setHdFiles([]); setHdBase64Files([]); };

            const submitNewTicket = async () => {
                setStatus('syncing_ticket');
                const payload = { action: "create_ticket", token, orderId: hdOrderId, category: activeTab, status: hdStatus, comment: hdComment, links: hdLinks, ticketFiles: hdBase64Files };
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setTimeout(() => { setShowCreateTicket(false); resetHelpdeskForm(); setStatus('idle'); loadDatabase(); }, 1500);
                } catch (e) { setStatus('idle'); }
            };

            const submitTicketReply = async () => {
                setStatus('syncing_ticket');
                const payload = { action: "update_ticket", token, ticketId: activeTicket.ticketId, userRole: userRole, status: hdStatus, comment: hdComment, links: hdLinks, ticketFiles: hdBase64Files };
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setTimeout(() => { setActiveTicket(null); resetHelpdeskForm(); setStatus('idle'); loadDatabase(); }, 1500);
                } catch (e) { setStatus('idle'); }
            };

            const parseLabelText = (text) => {
                const cleanText = text.toUpperCase().replace(/\n/g, ' ');
                let foundCourier = ""; 
                if (cleanText.includes("FEDEX")) foundCourier = "FedEx Ground";
                else if (cleanText.includes("UPS") || cleanText.includes("1Z")) foundCourier = "UPS";
                else if (cleanText.includes("USPS")) foundCourier = "USPS";
                else if (cleanText.includes("AMAZON") || cleanText.includes("TBA")) foundCourier = "Amazon";
                
                const fedexRegex = /(?:TRK|TRACKING|TRK#|TRKE)\s*[:#]?\s*([\d\s]{12,25})/gi;
                const matches = [...cleanText.matchAll(fedexRegex)];
                let foundTrks = matches.map(m => m[1].replace(/[^0-9]/g, '').substring(0, 12)).filter(d => d.length >= 12);
                let uniqueTrks = [...new Set(foundTrks)];
                if (uniqueTrks.length > 0 && foundCourier === "") foundCourier = "FedEx Ground";
                return { trk: uniqueTrks.length > 0 ? uniqueTrks.join(" , ") : "Not Found", courier: foundCourier };
            };

            const handleFileUpload = async (e) => {
                const upFiles = Array.from(e.target.files);
                if (upFiles.length === 0) return;
                setFiles(upFiles); setStatus('scanning');
                try {
                    let allBase64 = []; let combinedText = "";
                    for (let f of upFiles) {
                        const base64 = await new Promise(r => { const reader = new FileReader(); reader.onloadend = () => r(reader.result); reader.readAsDataURL(f); });
                        allBase64.push(base64);
                        const { data: { text } } = await Tesseract.recognize(f, 'eng');
                        combinedText += text + " ";
                    }
                    setBase64Images(allBase64);
                    const parsed = parseLabelText(combinedText);
                    if (parsed.trk !== "Not Found") setTrackingNumber(parsed.trk);
                    if (parsed.courier !== "") setCourier(parsed.courier); 
                    setStatus('idle'); 
                } catch (err) { setStatus('idle'); }
            };

            const handleSync = async () => {
                setStatus('syncing');
                const refund = (parseFloat(productCost) || 0) - (parseFloat(returnFee) || 0);
                const payload = { action: "standard", token, orderId, trackingNumber: trackingNumber || "No Tracking", courier: courier || "N/A", images: base64Images, productCost, returnFee, refundAmount: refund.toFixed(2) };
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setStatus('success');
                    setTimeout(() => { setOrderId(''); setProductCost(''); setReturnFee(''); setTrackingNumber(''); setCourier(''); setFiles([]); setBase64Images([]); setStatus('idle'); loadDatabase(); }, 1500);
                } catch (e) { setStatus('idle'); }
            };

            const initiateRecall = async () => {
                if (!recallOrderId) return;
                setStatus('syncing_recall');
                const payload = { action: "initiate_recall", token, orderId: recallOrderId };
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setTimeout(() => { setRecallOrderId(''); setStatus('idle'); loadDatabase(); }, 1500);
                } catch (e) { setStatus('idle'); }
            };

            const completeRecall = async (targetOrderId) => {
                setStatus('syncing_recall_complete');
                const refund = (parseFloat(productCost) || 0) - (parseFloat(returnFee) || 0);
                const payload = { action: "complete_recall", token, orderId: targetOrderId, trackingNumber, courier, productCost, returnFee, refundAmount: refund.toFixed(2) };
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setTimeout(() => { setResolvingId(null); setProductCost(''); setReturnFee(''); setTrackingNumber(''); setCourier(''); setStatus('idle'); loadDatabase(); }, 1500);
                } catch (e) { setStatus('idle'); }
            };

            if (!isAuth) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[#0b0e14]">
                        <div className="max-w-md w-full bg-[#161b22] border border-slate-800 rounded-[2rem] p-10 shadow-2xl flex flex-col items-center text-center">
                            <div className="w-16 h-16 bg-blue-600/20 rounded-full flex items-center justify-center mb-6"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#3b82f6" viewBox="0 0 16 16"><path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM5 8h6a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/></svg></div>
                            <h1 className="text-2xl font-black text-white tracking-widest uppercase mb-2">Secure Gateway</h1>
                            <div id="googleSignInDiv" className="mt-6"></div>
                            {authError && <div className="mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl"><p className="text-red-400 text-[10px] font-bold uppercase">{authError}</p></div>}
                        </div>
                    </div>
                );
            }

            // ==========================================
            // --- STRICT SEPARATION OF HISTORY LOGIC ---
            // ==========================================
            
            // 1. RECALLS DATA (Split into Pending vs Completed History)
            const allPendingRecalls = dbRecords.filter(r => r.trackingNumber === "PENDING RECALL");
            const filteredPendingRecalls = allPendingRecalls.filter(r => String(r.orderId).toLowerCase().includes(searchQuery.toLowerCase()));
            
            const allCompletedRecalls = dbRecords.filter(r => (r.submittedBy || "").includes("Completed by:"));
            const filteredCompletedRecalls = allCompletedRecalls.filter(r => String(r.orderId).toLowerCase().includes(searchQuery.toLowerCase()) || String(r.trackingNumber).toLowerCase().includes(searchQuery.toLowerCase()));
            const recallHistoryTotalPages = Math.ceil(filteredCompletedRecalls.length / ITEMS_PER_PAGE);
            const paginatedRecallHistory = filteredCompletedRecalls.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);

            // 2. STANDARD SCAN DATA (Only normal scans, excludes all recalls)
            const allStandardRecords = dbRecords.filter(r => r.trackingNumber !== "PENDING RECALL" && !(r.submittedBy || "").includes("Completed by:") && r.orderId);
            const filteredStandardRecords = allStandardRecords.filter(r => String(r.orderId).toLowerCase().includes(searchQuery.toLowerCase()) || String(r.trackingNumber).toLowerCase().includes(searchQuery.toLowerCase()));
            const standardTotalPages = Math.ceil(filteredStandardRecords.length / ITEMS_PER_PAGE);
            const paginatedStandard = filteredStandardRecords.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);

            // 3. HELPDESK TICKET DATA (Split into Active vs Closed History)
            const isTicketTab = HELPDESK_CATEGORIES.includes(activeTab);
            
            const activeCategoryTickets = tickets.filter(t => t.category === activeTab && t.status !== "Closed");
            const filteredActiveTickets = activeCategoryTickets.filter(t => String(t.orderId).toLowerCase().includes(searchQuery.toLowerCase()) || String(t.ticketId).toLowerCase().includes(searchQuery.toLowerCase()));
            
            const historyCategoryTickets = tickets.filter(t => t.category === activeTab && t.status === "Closed");
            const filteredHistoryTickets = historyCategoryTickets.filter(t => String(t.orderId).toLowerCase().includes(searchQuery.toLowerCase()) || String(t.ticketId).toLowerCase().includes(searchQuery.toLowerCase()));
            const ticketHistoryTotalPages = Math.ceil(filteredHistoryTickets.length / ITEMS_PER_PAGE);
            const paginatedTicketHistory = filteredHistoryTickets.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);

            const renderPagination = (totalPages) => {
                if (totalPages <= 1) return null;
                return (
                    <div className="flex justify-between items-center mt-6 bg-[#0b0e14] p-3 rounded-xl border border-slate-800">
                        <button onClick={() => setCurrentPage(p => Math.max(1, p - 1))} disabled={currentPage === 1} className="px-5 py-2 bg-slate-800 text-slate-400 rounded-lg text-[10px] font-black uppercase disabled:opacity-30 hover:bg-slate-700 hover:text-white transition-all">
                            Previous
                        </button>
                        <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Page {currentPage} of {totalPages}</span>
                        <button onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))} disabled={currentPage === totalPages} className="px-5 py-2 bg-slate-800 text-slate-400 rounded-lg text-[10px] font-black uppercase disabled:opacity-30 hover:bg-slate-700 hover:text-white transition-all">
                            Next
                        </button>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-6 md:p-12 flex flex-col items-center gap-10">
                    {/* NAVIGATION BAR */}
                    <div className="w-full max-w-4xl flex justify-between items-center border-b border-slate-800 pb-2">
                        <div className="flex gap-4 overflow-x-auto custom-scrollbar pb-2 min-w-0">
                            <button onClick={() => switchTab('scanner')} className={`whitespace-nowrap px-4 font-black uppercase tracking-widest text-sm transition-all ${activeTab === 'scanner' ? 'text-blue-500 border-b-2 border-blue-500' : 'text-slate-600 hover:text-slate-400'}`}>Standard Scan</button>
                            <button onClick={() => switchTab('recalls')} className={`whitespace-nowrap px-4 font-black uppercase tracking-widest text-sm transition-all flex items-center gap-2 ${activeTab === 'recalls' ? 'text-orange-500 border-b-2 border-orange-500' : 'text-slate-600 hover:text-slate-400'}`}>
                                Recalls {(allPendingRecalls.length > 0 && userRole !== "MANAGER") && <span className="bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-full">{allPendingRecalls.length}</span>}
                            </button>
                            {HELPDESK_TABS.map(tab => {
                                const count = tickets.filter(t => t.category === tab.id && ((userRole === "MANAGER" && t.status === "Waiting on Agent") || (userRole !== "MANAGER" && t.status === "Waiting on Supplier"))).length;
                                return (
                                    <button key={tab.id} onClick={() => switchTab(tab.id)} className={`whitespace-nowrap px-4 font-black uppercase tracking-widest text-sm transition-all flex items-center gap-2 ${activeTab === tab.id ? 'text-purple-500 border-b-2 border-purple-500' : 'text-slate-600 hover:text-slate-400'}`}>
                                        {tab.label} {count > 0 && <span className="bg-purple-500 text-white text-[10px] px-2 py-0.5 rounded-full">{count}</span>}
                                    </button>
                                );
                            })}
                        </div>
                        <div className="px-3 py-1 bg-slate-800 rounded-full ml-4 whitespace-nowrap">
                            <span className="text-[9px] font-black tracking-widest uppercase text-emerald-400">{userRole}</span>
                        </div>
                    </div>

                    {/* ========================================== */}
                    {/* TICKETING / HELPDESK VIEWS                 */}
                    {/* ========================================== */}
                    {isTicketTab && (
                        <div className="w-full max-w-2xl space-y-8">
                            {!showCreateTicket && !activeTicket && (
                                <div className="bg-[#161b22] border border-slate-800 rounded-[2rem] p-8 shadow-2xl">
                                    <div className="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
                                        <h1 className="text-xl font-black text-white tracking-widest italic uppercase">{HELPDESK_TABS.find(t => t.id === activeTab).label}</h1>
                                        <div className="flex gap-2 items-center">
                                            <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Search ID..." className="bg-[#0b0e14] border border-slate-700 rounded-lg px-3 py-1.5 text-white text-[10px] font-bold uppercase tracking-widest outline-none focus:border-purple-500 w-32 md:w-48 transition-all placeholder:text-slate-600" />
                                            <button onClick={loadDatabase} className="text-[9px] font-bold text-purple-500 border border-purple-500/20 px-3 py-1.5 rounded-lg uppercase hover:bg-purple-500/10">Refresh</button>
                                            {userRole === "MANAGER" && (
                                                <button onClick={() => setShowCreateTicket(true)} className="text-[9px] font-bold bg-purple-600 text-white px-3 py-1.5 rounded-lg uppercase hover:bg-purple-500">+ Ticket</button>
                                            )}
                                        </div>
                                    </div>

                                    {/* ACTIVE TICKETS */}
                                    <h2 className="text-[10px] font-black text-slate-500 tracking-[0.2em] uppercase mb-4 ml-2 mt-2">Active Tickets</h2>
                                    <div className="space-y-4 mb-8">
                                        {filteredActiveTickets.length === 0 && <p className="text-slate-500 text-xs italic text-center py-4">No active tickets.</p>}
                                        {filteredActiveTickets.map((t, i) => (
                                            <div key={i} onClick={() => { setActiveTicket(t); setHdStatus(userRole !== "MANAGER" ? "Waiting on Agent" : ""); }} className="bg-[#0b0e14] border border-slate-700 hover:border-purple-500/50 rounded-2xl p-5 cursor-pointer transition-all flex justify-between items-center group">
                                                <div>
                                                    <div className="flex items-center gap-3 mb-1">
                                                        <span className="text-white font-black text-sm">{t.orderId}</span>
                                                        <span className="text-slate-500 text-[10px] font-mono">{t.ticketId}</span>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <span className={`text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full ${t.status === 'Waiting on Supplier' ? 'bg-orange-500/20 text-orange-400' : 'bg-purple-500/20 text-purple-400'}`}>
                                                        {t.status}
                                                    </span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* TICKET HISTORY (CLOSED) */}
                                    <h2 className="text-[10px] font-black text-slate-500 tracking-[0.2em] uppercase mb-4 ml-2 mt-8 border-t border-slate-800 pt-6">Ticket History (Closed)</h2>
                                    <div className="space-y-4">
                                        {paginatedTicketHistory.length === 0 && <p className="text-slate-600 text-xs italic text-center py-4">No history available.</p>}
                                        {paginatedTicketHistory.map((t, i) => (
                                            <div key={i} onClick={() => { setActiveTicket(t); setHdStatus(userRole !== "MANAGER" ? "Waiting on Agent" : ""); }} className="bg-[#0b0e14] border border-slate-800 hover:border-slate-600 rounded-2xl p-5 cursor-pointer transition-all flex justify-between items-center opacity-70 hover:opacity-100">
                                                <div>
                                                    <div className="flex items-center gap-3 mb-1">
                                                        <span className="text-slate-300 font-black text-sm">{t.orderId}</span>
                                                        <span className="text-slate-500 text-[10px] font-mono">{t.ticketId}</span>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <span className="text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full bg-slate-800 text-slate-400">
                                                        Closed
                                                    </span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    {renderPagination(ticketHistoryTotalPages)}
                                </div>
                            )}

                            {showCreateTicket && userRole === "MANAGER" && (
                                <div className="bg-[#161b22] border border-purple-500/30 rounded-[2rem] p-8 shadow-2xl animate-fade-in">
                                    <h2 className="text-sm font-black text-purple-500 tracking-widest uppercase mb-6 flex justify-between items-center">
                                        Open New Ticket <button onClick={() => {setShowCreateTicket(false); resetHelpdeskForm();}} className="text-slate-500 hover:text-white">✕</button>
                                    </h2>
                                    <div className="space-y-4">
                                        <input value={hdOrderId} onChange={(e) => setHdOrderId(e.target.value)} placeholder="ORDER ID *" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-purple-500 font-bold uppercase"/>
                                        <select value={hdStatus} onChange={(e) => setHdStatus(e.target.value)} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-purple-500 font-bold text-sm">
                                            <option value="" disabled>Initial Status *</option>
                                            <option value="Open">Open</option>
                                            <option value="Waiting on Supplier">Waiting on Supplier</option>
                                            <option value="Closed">Closed</option>
                                        </select>
                                        <textarea value={hdComment} onChange={(e) => setHdComment(e.target.value)} placeholder="Enter details..." rows="3" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-purple-500 font-bold text-sm custom-scrollbar"></textarea>
                                        <input value={hdLinks} onChange={(e) => setHdLinks(e.target.value)} placeholder="Related Links/URLs (Optional)" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-purple-500 font-bold text-sm"/>
                                        <div onClick={() => status !== 'reading_files' && hdFileInputRef.current.click()} className="border-2 border-dashed border-slate-800 rounded-xl p-4 flex flex-col items-center justify-center cursor-pointer hover:border-purple-500 bg-[#0b0e14]/50">
                                            <input type="file" multiple accept=".jpg,.jpeg,.png,.pdf" ref={hdFileInputRef} onChange={handleHelpdeskFileUpload} className="hidden" />
                                            {hdFiles.length > 0 ? <p className="text-purple-400 font-bold text-xs uppercase">{hdFiles.length} File(s) Attached</p> : <p className="text-slate-500 text-xs font-bold uppercase">Attach Files (PDF, JPG, PNG)</p>}
                                        </div>
                                        <button onClick={submitNewTicket} disabled={!hdOrderId || !hdStatus || status.includes('sync')} className="w-full bg-purple-600 hover:bg-purple-500 text-white py-4 rounded-xl font-black text-sm tracking-widest uppercase disabled:opacity-30 transition-all">
                                            {status === 'syncing_ticket' ? 'Creating...' : 'Create Ticket'}
                                        </button>
                                    </div>
                                </div>
                            )}

                            {activeTicket && (
                                <div className="bg-[#161b22] border border-slate-800 rounded-[2rem] shadow-2xl flex flex-col h-[80vh] animate-fade-in">
                                    <div className="p-6 border-b border-slate-800 flex justify-between items-center bg-[#0b0e14] rounded-t-[2rem]">
                                        <div>
                                            <h2 className="text-white font-black text-xl">{activeTicket.orderId}</h2>
                                            <p className="text-slate-400 text-xs font-bold">{activeTicket.category} • <span className="text-purple-400">{activeTicket.status}</span></p>
                                        </div>
                                        <button onClick={() => {setActiveTicket(null); resetHelpdeskForm();}} className="bg-slate-800 text-white px-4 py-2 rounded-full text-xs font-black uppercase hover:bg-slate-700">Back</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar bg-[#0b0e14]/30">
                                        {activeTicket.thread.map((msg, i) => {
                                            const isMe = msg.role === userRole;
                                            return (
                                                <div key={i} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'}`}>
                                                    <span className="text-[9px] font-bold text-slate-500 mb-1 uppercase tracking-wider">{msg.role} • {new Date(msg.date).toLocaleDateString()}</span>
                                                    <div className={`p-4 rounded-2xl max-w-[85%] ${isMe ? 'bg-purple-600/20 border border-purple-500/30 text-white' : 'bg-slate-800 border border-slate-700 text-slate-200'}`}>
                                                        {msg.comment && <p className="text-sm font-medium whitespace-pre-wrap">{msg.comment}</p>}
                                                        {msg.links && <a href={msg.links} target="_blank" className="text-blue-400 text-xs font-bold underline mt-2 block break-all">{msg.links}</a>}
                                                        {msg.files && msg.files.length > 0 && (
                                                            <div className="mt-3 flex gap-2 flex-wrap">
                                                                {msg.files.map((url, idx) => (
                                                                    <a key={idx} href={url} target="_blank" className="bg-[#0b0e14] border border-slate-700 px-3 py-1 rounded-lg text-[10px] font-bold text-slate-300 hover:text-purple-400">📎 Attachment {idx + 1}</a>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                    {activeTicket.status !== 'Closed' && (
                                        <div className="p-6 border-t border-slate-800 bg-[#161b22] rounded-b-[2rem]">
                                            <div className="space-y-3">
                                                <textarea value={hdComment} onChange={(e) => setHdComment(e.target.value)} placeholder="Type your reply..." rows="2" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-purple-500 font-bold text-sm custom-scrollbar"></textarea>
                                                <div className="flex gap-3">
                                                    <div className="flex-1">
                                                        {userRole === "MANAGER" ? (
                                                            <select value={hdStatus} onChange={(e) => setHdStatus(e.target.value)} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-purple-500 font-bold text-xs">
                                                                <option value="" disabled>Update Status *</option>
                                                                <option value="Open">Open</option>
                                                                <option value="Waiting on Supplier">Waiting on Supplier</option>
                                                                <option value="Closed">Closed</option>
                                                            </select>
                                                        ) : (
                                                            <select value={hdStatus} disabled className="w-full bg-[#0b0e14] border border-purple-500/50 rounded-xl p-3 text-purple-400 font-black text-xs opacity-80">
                                                                <option value="Waiting on Agent">Status: Waiting on Agent</option>
                                                            </select>
                                                        )}
                                                    </div>
                                                    <input value={hdLinks} onChange={(e) => setHdLinks(e.target.value)} placeholder="Links (Opt)" className="flex-1 bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-purple-500 font-bold text-xs"/>
                                                    <div onClick={() => status !== 'reading_files' && hdFileInputRef.current.click()} className="flex-1 border border-slate-700 rounded-xl p-3 flex items-center justify-center cursor-pointer hover:border-purple-500 bg-[#0b0e14]">
                                                        <input type="file" multiple accept=".jpg,.jpeg,.png,.pdf" ref={hdFileInputRef} onChange={handleHelpdeskFileUpload} className="hidden" />
                                                        <span className="text-slate-400 text-xs font-bold uppercase">{hdFiles.length > 0 ? `${hdFiles.length} Files` : '📎 Attach'}</span>
                                                    </div>
                                                </div>
                                                <button onClick={submitTicketReply} disabled={!hdStatus && userRole === "MANAGER" || status.includes('sync')} className="w-full bg-purple-600 hover:bg-purple-500 text-white py-3 rounded-xl font-black text-xs tracking-widest uppercase disabled:opacity-30 transition-all">
                                                    {status === 'syncing_ticket' ? 'Sending...' : 'Send Reply'}
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}

                    {/* ========================================== */}
                    {/* STANDARD SCAN TAB                          */}
                    {/* ========================================== */}
                    {activeTab === 'scanner' && (
                        <div className="w-full max-w-xl space-y-8 animate-fade-in">
                            <div className="bg-[#161b22] border border-slate-800 rounded-[2rem] p-8 shadow-2xl">
                                <div className="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
                                    <div><h1 className="text-xl font-black text-white tracking-widest italic uppercase">Standard Return</h1></div>
                                    <button onClick={loadDatabase} className="text-[9px] font-bold text-blue-500 border border-blue-500/20 px-3 py-1 rounded-full uppercase hover:bg-blue-500/10">Refresh</button>
                                </div>
                                <div className="space-y-6">
                                    <input value={orderId} onChange={(e) => setOrderId(e.target.value)} placeholder="ORDER ID *" className="w-full bg-[#0b0e14] border border-slate-700 rounded-2xl p-5 text-white outline-none focus:border-blue-500 font-bold placeholder:text-slate-600 uppercase tracking-widest"/>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2"><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Tracking Number</label><input type="text" value={trackingNumber} onChange={(e) => setTrackingNumber(e.target.value)} placeholder="Manual or Scan" className="w-full bg-[#0b0e14] border border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 font-bold text-sm"/></div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Courier</label>
                                            <select value={courier} onChange={(e) => setCourier(e.target.value)} className="w-full bg-[#0b0e14] border border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 font-bold text-sm cursor-pointer">
                                                <option value="" disabled>Select Courier</option>
                                                <option value="FedEx Ground">FedEx Ground</option>
                                                <option value="Amazon">Amazon</option>
                                                <option value="UPS">UPS</option>
                                                <option value="USPS">USPS</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2"><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Product Cost</label><input type="number" value={productCost} onChange={(e) => setProductCost(e.target.value)} placeholder="$ 0.00" className="w-full bg-[#0b0e14] border border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 font-bold"/></div>
                                        <div className="space-y-2"><label className="text-[10px] text-slate-500 font-bold uppercase ml-2">Return Fee</label><input type="number" value={returnFee} onChange={(e) => setReturnFee(e.target.value)} placeholder="$ 0.00" className="w-full bg-[#0b0e14] border border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-red-500 font-bold"/></div>
                                    </div>
                                    <div onClick={() => status !== 'scanning' && fileInputRef.current.click()} className="border-2 border-dashed border-slate-800 rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer hover:border-blue-600 transition-all bg-[#0b0e14]/50">
                                        <input type="file" multiple ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                                        {status === 'scanning' ? <p className="text-yellow-500 text-xs font-black uppercase tracking-widest animate-pulse">Scanning...</p> : files.length > 0 ? <p className="text-blue-400 font-black tracking-widest uppercase text-sm">{files.length} Document(s)</p> : <div className="text-center"><p className="text-slate-400 text-sm font-black uppercase tracking-widest">Attach Label Image</p></div>}
                                    </div>
                                    <button onClick={handleSync} disabled={!orderId || !courier || status === 'scanning' || status === 'syncing'} className={`w-full py-5 rounded-2xl font-black text-lg tracking-widest transition-all ${orderId && courier && status !== 'scanning' && status !== 'syncing' ? 'bg-blue-600 text-white shadow-xl hover:bg-blue-500' : 'bg-slate-800 text-slate-600'}`}>
                                        {status === 'syncing' ? 'SAVING...' : status === 'success' ? '✓ SAVED' : 'SUBMIT RECORD'}
                                    </button>
                                </div>
                            </div>

                            {/* STANDARD SCAN HISTORY */}
                            <div>
                                <div className="flex justify-between items-center mb-4 ml-2">
                                    <h2 className="text-[10px] font-black text-slate-500 tracking-[0.2em] uppercase">Standard Return History</h2>
                                    <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Search ID or Tracking..." className="bg-[#0b0e14] border border-slate-700 rounded-lg px-3 py-1.5 text-white text-[10px] font-bold uppercase tracking-widest outline-none focus:border-blue-500 w-36 md:w-48 transition-all placeholder:text-slate-600" />
                                </div>
                                <div className="space-y-3">
                                    {paginatedStandard.map((rec, i) => (
                                        <div key={i} className="bg-[#161b22] border border-slate-700 rounded-2xl p-5 flex justify-between items-center group hover:border-blue-500/50 transition-all">
                                            <div>
                                                <p className="text-white font-black text-sm">{rec.orderId}</p>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">{rec.courier} • {rec.trackingNumber}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-blue-400 font-black text-sm">${rec.refundAmount}</p>
                                                <p className="text-[9px] text-slate-500 font-bold uppercase mt-1">{new Date(rec.timestamp).toLocaleDateString()}</p>
                                            </div>
                                        </div>
                                    ))}
                                    {filteredStandardRecords.length === 0 && <p className="text-slate-600 text-xs text-center font-bold italic mt-8">{searchQuery ? "No matches found." : "No history available."}</p>}
                                </div>
                                {renderPagination(standardTotalPages)}
                            </div>
                        </div>
                    )}

                    {/* ========================================== */}
                    {/* RECALLS TAB                                */}
                    {/* ========================================== */}
                    {activeTab === 'recalls' && (
                        <div className="w-full max-w-xl space-y-8 animate-fade-in">
                            {userRole === "MANAGER" && (
                                <div className="bg-[#161b22] border border-orange-500/30 rounded-[2rem] p-8 shadow-2xl">
                                    <h2 className="text-sm font-black text-orange-500 tracking-widest uppercase mb-4">Request a Recall</h2>
                                    <div className="flex gap-4">
                                        <input value={recallOrderId} onChange={(e) => setRecallOrderId(e.target.value)} placeholder="ENTER ORDER ID" className="flex-1 bg-[#0b0e14] border border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-orange-500 font-bold uppercase tracking-widest"/>
                                        <button onClick={initiateRecall} disabled={!recallOrderId || status === 'syncing_recall'} className="bg-orange-500 hover:bg-orange-600 text-white px-6 rounded-2xl font-black uppercase tracking-widest text-xs disabled:opacity-50">
                                            {status === 'syncing_recall' ? '...' : 'Submit'}
                                        </button>
                                    </div>
                                </div>
                            )}

                            <div>
                                <div className="flex justify-between items-center mb-4 ml-2">
                                    <h2 className="text-[10px] font-black text-slate-500 tracking-[0.2em] uppercase">Action Required</h2>
                                    <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Search ID..." className="bg-[#0b0e14] border border-slate-700 rounded-lg px-3 py-1.5 text-white text-[10px] font-bold uppercase tracking-widest outline-none focus:border-orange-500 w-32 md:w-48 transition-all placeholder:text-slate-600" />
                                </div>

                                <div className="space-y-4 mb-8">
                                    {filteredPendingRecalls.map((rec, i) => (
                                        <div key={i} className="bg-[#161b22] border border-slate-700 rounded-2xl p-6 transition-all">
                                            <div className="flex justify-between items-center mb-4">
                                                <div>
                                                    <p className="text-white font-black text-lg">{rec.orderId}</p>
                                                    <p className="text-[10px] text-orange-400 font-bold uppercase tracking-widest mt-1">Pending Supplier Action</p>
                                                </div>
                                                {resolvingId !== rec.orderId && (
                                                    <button onClick={() => { setResolvingId(rec.orderId); setCourier(''); }} className="border border-orange-500 text-orange-500 hover:bg-orange-500 hover:text-white px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all">Complete Form</button>
                                                )}
                                            </div>

                                            {resolvingId === rec.orderId && (
                                                <div className="mt-6 pt-6 border-t border-slate-800 space-y-4 animate-fade-in">
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div className="space-y-1"><label className="text-[9px] text-slate-500 font-bold uppercase ml-2">Tracking *</label><input type="text" onChange={(e) => setTrackingNumber(e.target.value)} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white font-bold text-xs outline-none focus:border-orange-500"/></div>
                                                        <div className="space-y-1">
                                                            <label className="text-[9px] text-slate-500 font-bold uppercase ml-2">Courier *</label>
                                                            <select value={courier} onChange={(e) => setCourier(e.target.value)} className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white font-bold text-xs outline-none focus:border-orange-500 cursor-pointer">
                                                                <option value="" disabled>Select Courier</option>
                                                                <option value="FedEx Ground">FedEx Ground</option>
                                                                <option value="Amazon">Amazon</option>
                                                                <option value="UPS">UPS</option>
                                                                <option value="USPS">USPS</option>
                                                            </select>
                                                        </div>
                                                        <div className="space-y-1"><label className="text-[9px] text-slate-500 font-bold uppercase ml-2">Product Cost *</label><input type="number" onChange={(e) => setProductCost(e.target.value)} placeholder="$" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white font-bold text-xs outline-none focus:border-orange-500"/></div>
                                                        <div className="space-y-1"><label className="text-[9px] text-slate-500 font-bold uppercase ml-2">Return Fee *</label><input type="number" onChange={(e) => setReturnFee(e.target.value)} placeholder="$" className="w-full bg-[#0b0e14] border border-slate-700 rounded-xl p-3 text-white font-bold text-xs outline-none focus:border-orange-500"/></div>
                                                    </div>
                                                    <div className="flex gap-2 pt-2">
                                                        <button onClick={() => { setResolvingId(null); setCourier(''); }} className="flex-1 bg-slate-800 text-slate-400 py-4 rounded-xl font-black text-xs tracking-widest uppercase hover:bg-slate-700">Cancel</button>
                                                        <button onClick={() => completeRecall(rec.orderId)} disabled={!trackingNumber || !courier || !productCost || !returnFee || status === 'syncing_recall_complete'} className="flex-[2] bg-orange-500 text-white py-4 rounded-xl font-black text-xs tracking-widest uppercase hover:bg-orange-600 disabled:opacity-30 disabled:cursor-not-allowed transition-all">
                                                            {status === 'syncing_recall_complete' ? 'Saving...' : 'Submit Resolution'}
                                                        </button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                    {filteredPendingRecalls.length === 0 && <p className="text-slate-600 text-xs text-center font-bold italic mt-8">{searchQuery ? "No matches found for that ID." : "No pending recalls at this time."}</p>}
                                </div>
                                
                                {/* RECALL HISTORY (COMPLETED) */}
                                <h2 className="text-[10px] font-black text-slate-500 tracking-[0.2em] uppercase mb-4 ml-2 mt-8 border-t border-slate-800 pt-6">Completed Recall History</h2>
                                <div className="space-y-3">
                                    {paginatedRecallHistory.map((rec, i) => (
                                        <div key={i} className="bg-[#161b22] border border-slate-800 rounded-2xl p-5 flex justify-between items-center opacity-70 hover:opacity-100 hover:border-orange-500/50 transition-all">
                                            <div>
                                                <p className="text-slate-200 font-black text-sm">{rec.orderId}</p>
                                                <p className="text-[10px] text-slate-500 font-bold uppercase mt-1">{rec.courier} • {rec.trackingNumber}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-orange-500 font-black text-sm">${rec.refundAmount}</p>
                                                <p className="text-[9px] text-slate-500 font-bold uppercase mt-1">{new Date(rec.timestamp).toLocaleDateString()}</p>
                                            </div>
                                        </div>
                                    ))}
                                    {filteredCompletedRecalls.length === 0 && <p className="text-slate-600 text-xs text-center font-bold italic mt-8">{searchQuery ? "No matches found." : "No history available."}</p>}
                                </div>
                                {renderPagination(recallHistoryTotalPages)}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
